<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта, мама и бабушка!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd9e6 0%, #fff0f5 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Падающие лепестки */
        .petal {
            position: fixed;
            top: -10%;
            color: #ffb7c5;
            font-size: 24px;
            opacity: 0.5;
            animation: fall linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0.2; }
        }

        /* Основная открытка */
        .card {
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 25px 40px rgba(255, 120, 160, 0.25),
                        0 0 0 2px #fff9 inset,
                        0 0 0 4px #ffc0cb inset;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* Венок из цветов вверху */
        .flower-decoration {
            font-size: 42px;
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px #ffa5b9;
            letter-spacing: 10px;
            animation: sparkle 3s infinite;
        }

        @keyframes sparkle {
            0% { opacity: 0.8; text-shadow: 2px 2px 8px #ff80a5; }
            50% { opacity: 1; text-shadow: 4px 4px 15px #ff4d7a; }
            100% { opacity: 0.8; text-shadow: 2px 2px 8px #ff80a5; }
        }

        h1 {
            font-size: 48px;
            font-weight: 600;
            color: #a13d5f;
            text-shadow: 3px 3px 0 #ffdbdb;
            margin-bottom: 15px;
            font-family: 'Georgia', 'Times New Roman', serif;
            letter-spacing: 2px;
        }

        .names {
            background: rgba(255, 220, 240, 0.7);
            border-radius: 100px;
            padding: 20px 25px;
            margin: 20px 0;
            border: 2px dashed #ff98b9;
            box-shadow: 0 8px 0 #e6a0b5;
        }

        .names p {
            font-size: 38px;
            font-weight: bold;
            color: #b3436b;
            line-height: 1.4;
        }

        .names span {
            display: inline-block;
            background: white;
            padding: 5px 20px;
            border-radius: 50px;
            margin: 0 5px;
            box-shadow: 0 4px 0 #ffb6c1;
            font-size: 40px;
        }

        .message {
            font-size: 22px;
            color: #5f3d4a;
            background: rgba(255, 245, 250, 0.9);
            padding: 25px 20px;
            border-radius: 50px 50px 30px 30px;
            margin: 25px 0;
            line-height: 1.6;
            border: 1px solid white;
        }

        .message i {
            color: #d64161;
            font-style: italic;
        }

        /* Букеты цветов (эмоджи) */
        .flowers-bouquet {
            font-size: 60px;
            margin: 25px 0 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            filter: drop-shadow(0 8px 10px #ffb3c6);
        }

        .flowers-bouquet div {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            padding: 15px;
            line-height: 1;
            backdrop-filter: blur(2px);
            border: 2px solid white;
            transform: rotate(5deg);
            transition: 0.3s;
        }

        .flowers-bouquet div:hover {
            transform: scale(1.1) rotate(-5deg);
            background: rgba(255, 200, 220, 0.8);
        }

        .footer {
            margin-top: 20px;
            font-size: 28px;
            color: #b34e6e;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .footer span {
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.2); }
            50% { transform: scale(1.1); }
            70% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* Ручное дополнение: рисуем цветочки слева и справа */
        .side-flower-left, .side-flower-right {
            position: absolute;
            font-size: 70px;
            opacity: 0.3;
            bottom: 20px;
            z-index: 0;
            transform: rotate(15deg);
        }
        .side-flower-left {
            left: 10px;
            top: 30%;
            font-size: 90px;
        }
        .side-flower-right {
            right: 10px;
            bottom: 20%;
            font-size: 80px;
            transform: rotate(-20deg);
        }
    </style>
</head>
<body>

<!-- Анимированные лепестки (создаются через JS) -->
<div class="petal" style="left: 5%; animation-duration: 8s;">🌸</div>
<div class="petal" style="left: 15%; animation-duration: 10s; font-size: 20px;">🌷</div>
<div class="petal" style="left: 25%; animation-duration: 7s;">🌼</div>
<div class="petal" style="left: 40%; animation-duration: 12s; font-size: 30px;">🌺</div>
<div class="petal" style="left: 55%; animation-duration: 9s;">🌹</div>
<div class="petal" style="left: 70%; animation-duration: 11s; font-size: 22px;">🌸</div>
<div class="petal" style="left: 85%; animation-duration: 8s;">🌷</div>
<div class="petal" style="left: 95%; animation-duration: 10s;">🌼</div>

<!-- Декоративные крупные цветы по бокам -->
<div class="side-flower-left">🌷🌸🌷</div>
<div class="side-flower-right">🌼🌹🌼</div>

<!-- Главная открытка -->
<div class="card">
    <div class="flower-decoration">🌸🌷🌼🌺🌹🌸</div>

    <h1>С 8 марта!</h1>

    <div class="names">
        <p>💗 <span>мама Карина</span> 💗</p>
        <p>💗 <span>бабушка Марина</span> 💗</p>
    </div>

    <div class="message">
        <i>Дорогие и любимые!</i><br>
        🌸 Пусть весна подарит вам море цветов,<br>
        🌷 тепла, улыбок и радости!<br>
        💐 Спасибо за вашу заботу и ласку.<br>
        ❤️ Вы самые прекрасные женщины на свете!
    </div>

    <!-- Много-много цветов -->
    <div class="flowers-bouquet">
        <div>🌷</div>
        <div>🌹</div>
        <div>🌸</div>
        <div>🌼</div>
        <div>🌺</div>
        <div>💐</div>
    </div>

    <!-- Нижняя строка с сердечками -->
    <div class="footer">
        <span>❤️</span> С любовью <span>❤️</span>
    </div>

    <div style="margin-top: 15px; font-size: 22px; color: #b34e6e;">
        💞 ваш сын / внук 💞   <!-- Здесь можете подписать своё имя или оставить так -->
    </div>
</div>

<!-- Дополнительный JS для создания большего количества лепестков (красиво и легко) -->
<script>
    (function addMorePetals() {
        const petalsCount = 12;
        const flowers = ['🌸', '🌷', '🌼', '🌺', '🌹', '🌸', '🌷', '🌸', '🌼'];
        for (let i = 0; i < petalsCount; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            const left = Math.random() * 100;
            const size = 16 + Math.random() * 30;
            const duration = 5 + Math.random() * 12;
            const delay = Math.random() * 10;
            const flower = flowers[Math.floor(Math.random() * flowers.length)];
            petal.style.left = left + '%';
            petal.style.fontSize = size + 'px';
            petal.style.animationDuration = duration + 's';
            petal.style.animationDelay = delay + 's';
            petal.style.opacity = 0.5 + Math.random() * 0.3;
            petal.textContent = flower;
            document.body.appendChild(petal);
        }
    })();
</script>

<!-- Добавим немного дополнительных статичных цветочков в углах через CSS-псевдо, но необязательно -->

<style>
    /* Ещё немного украшательства */
    .card::before {
        content: "🌷";
        position: absolute;
        top: -15px;
        left: -20px;
        font-size: 70px;
        opacity: 0.3;
        transform: rotate(-20deg);
        z-index: -1;
    }
    .card::after {
        content: "🌼";
        position: absolute;
        bottom: -20px;
        right: -25px;
        font-size: 85px;
        opacity: 0.3;
        transform: rotate(15deg);
        z-index: -1;
    }
    /* Чтобы фон не перекрывал */
    body {
        position: relative;
    }
    /* Добавим мерцание именам */
    .names span {
        animation: softGlow 2s infinite alternate;
    }
    @keyframes softGlow {
        from { box-shadow: 0 4px 0 #ffb6c1, 0 0 5px #ffb6c1; }
        to { box-shadow: 0 4px 0 #ff8da1, 0 0 15px #ff4d6d; }
    }
</style>

</body>
</html>
