<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта, мама Лилия!</title>
    <style>
        /* Сбрасываем отступы и задаем общий стиль */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #f9e3e0 0%, #ffe4e1 100%);
            padding: 20px;
            /* Обои в мелкий цветочек для объема (очень прозрачный) */
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 182, 193, 0.2) 2px, transparent 2px),
                              radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.15) 1px, transparent 2px);
            background-size: 50px 50px, 80px 80px;
        }

        /* Основная открытка */
        .card {
            max-width: 700px;
            width: 100%;
            background: #fff9fe; /* Нежный, почти белый с розовинкой */
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 25px 40px rgba(201, 78, 112, 0.25),
                        0 0 0 2px #ffc0cb inset, /* внутренняя рамочка */
                        0 0 0 5px #ffffff inset; /* ещё одна для объема */
            padding: 30px 30px 50px 30px;
            text-align: center;
            border: 3px solid #ffb7c5;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* Шапка с завитушкой */
        .header-decoration {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .header-decoration span {
            font-size: 32px;
            color: #d44e6c;
            text-shadow: 0 2px 5px #fba0b5;
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #b34462, #d6244e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 3px 3px 0 #ffe2e9;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 24px;
            color: #b34e6b;
            background: #ffd9e2;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 50px;
            margin-bottom: 30px;
            font-weight: 600;
            box-shadow: 0 4px 0 #b37b8a;
            border: 2px solid white;
        }

        /* Букет из тюльпанов (символ 8 марта) — стилизованный */
        .flower-bouquet {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 25px 0 35px 0;
            flex-wrap: wrap;
        }

        .flower {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bloom {
            width: 60px;
            height: 60px;
            background: #ff80a5; /* ярко-розовый */
            border-radius: 70% 30% 60% 40% / 50% 60% 40% 50%;
            transform: rotate(-10deg);
            box-shadow: 0 8px 0 #b34362, 0 12px 15px rgba(180, 60, 100, 0.3);
            border: 2px solid #fff4f7;
            margin-bottom: -5px;
        }

        .bloom2 {
            background: #ff5f8f;
            transform: rotate(5deg) scale(1.1);
            box-shadow: 0 8px 0 #a13050, 0 12px 15px rgba(200, 70, 110, 0.4);
        }

        .bloom3 {
            background: #fa6b96;
            transform: rotate(-2deg) scale(1.05);
            box-shadow: 0 8px 0 #b83b60, 0 12px 15px rgba(210, 70, 120, 0.3);
        }

        .stem {
            width: 8px;
            height: 70px;
            background: #6b8c5c;
            border-radius: 4px 4px 0 0;
            box-shadow: 2px 0 0 #3e6b34;
            border: 1px solid #9fc090;
        }

        .leaf {
            width: 22px;
            height: 12px;
            background: #89b87c;
            border-radius: 0 80% 0 80%;
            transform: rotate(25deg);
            margin-top: -10px;
            margin-left: 15px;
            box-shadow: -1px -1px 0 #4c7a41;
        }

        /* Основное поздравление */
        .message {
            background: rgba(255, 230, 240, 0.7);
            padding: 30px 20px;
            border-radius: 70px 20px 70px 20px;
            border: 3px dashed #ffa5b9;
            margin: 30px 0;
            backdrop-filter: blur(2px);
        }

        .message p {
            font-size: 26px;
            font-weight: 600;
            color: #9e3a56;
            line-height: 1.5;
        }

        .message strong {
            color: #c7254c;
            font-size: 32px;
            font-weight: 800;
            background: #fff0f5;
            padding: 0 8px;
            border-radius: 20px;
        }

        .message i {
            color: #ce4c6c;
            display: block;
            margin-top: 20px;
            font-size: 22px;
        }

        .signature {
            font-size: 38px;
            font-weight: bold;
            color: #ad3f60;
            text-align: right;
            margin-top: 20px;
            border-top: 3px wavy #feb0c0;
            padding-top: 25px;
            font-family: 'Brush Script MT', cursive;
            text-shadow: 2px 2px 0 #ffe2eb;
        }

        .signature span {
            background: #ffd3db;
            padding: 8px 20px;
            border-radius: 40px 8px 40px 8px;
            border: 2px solid white;
        }

        .emoji-decoration {
            font-size: 45px;
            margin: 10px 0 -10px;
            letter-spacing: 15px;
            filter: drop-shadow(0 6px 3px #e7a5b5);
        }

        footer {
            color: #b75a74;
            font-size: 20px;
            margin-top: 25px;
            font-weight: 500;
            background: #ffeef2;
            padding: 15px;
            border-radius: 100px;
            border: 1px solid #ffb6c9;
        }

        /* маленькие сердечки и цветочки вокруг */
        .floating-hearts {
            position: relative;
            width: 100%;
            height: 20px;
            margin: 15px 0;
        }

        .floating-hearts::before,
        .floating-hearts::after {
            content: "🌸🌷💐🌺🌹";
            font-size: 28px;
            opacity: 0.7;
            display: inline-block;
            animation: float 4s infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-8px) rotate(3deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Верхний декор -->
        <div class="header-decoration">
            <span>🌸</span>
            <span>🌷</span>
            <span>💐</span>
        </div>

        <h1>8 Марта</h1>
        <div class="sub-title">мама Лилия</div>

        <!-- Цветочный ряд (объемные тюльпаны в стиле минимализма, но ярко) -->
        <div class="flower-bouquet">
            <div class="flower">
                <div class="bloom bloom1"></div>
                <div class="stem"></div>
                <div class="leaf"></div>
            </div>
            <div class="flower">
                <div class="bloom bloom2"></div>
                <div class="stem"></div>
                <div class="leaf" style="transform: rotate(45deg); margin-left: 10px;"></div>
            </div>
            <div class="flower">
                <div class="bloom bloom3"></div>
                <div class="stem"></div>
                <div class="leaf" style="transform: rotate(-10deg); margin-left: -5px;"></div>
            </div>
        </div>

        <!-- Текст поздравления с именем -->
        <div class="message">
            <p>
                🌷 С днём 8 марта, <strong>мама Лилия!</strong> 🌷
            </p>
            <p style="font-size: 22px; margin-top: 15px;">
                Ты — самая красивая, нежная и заботливая.<br>
                Пусть каждый день дарит тебе улыбки, цветы и тепло!<br>
                Оставайся такой же лучезарной.
            </p>
            <i>С любовью и благодарностью,</i>
        </div>

        <!-- Подпись от Тимофея, ярко и крупно -->
        <div class="signature">
            <span>Тимофей 💖</span>
        </div>

        <!-- Эмоджи-украшение -->
        <div class="emoji-decoration">
            🌺🌸🌼🌷🌹
        </div>

        <!-- Нижний блок с комплиментом -->
        <footer>
            ✨ Для самой лучшей мамы на свете ✨
        </footer>

        <div class="floating-hearts"></div>
    </div>

    <!-- Можно добавить скрипт для небольшого эффекта, но это не обязательно.
         Для красоты - звук не вставляем, но можно анимировать цветочки при клике. Но обойдёмся CSS -->
</body>
</html>
