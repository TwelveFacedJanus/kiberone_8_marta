<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, мама Света!</title>
    <style>
        /* Обнуление и базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-color: #f0e6ff; /* Нежно-фиолетовый базовый */
            background-image: radial-gradient(circle at 20% 30%, #f3e8ff 0%, #e9d9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            position: relative;
        }

        /* Основная открытка */
        .card {
            max-width: 750px;
            width: 100%;
            background: rgba(253, 198, 224, 0.904);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 70px 70px 50px 50px;
            box-shadow: 0 30px 40px rgba(80, 40, 120, 0.25),
                        inset 0 2px 10px rgba(255, 255, 255, 0.8);
            padding: 40px 35px 50px;
            border: 2px solid rgba(230, 210, 255, 0.9);
            position: relative;
            z-index: 10;
            transition: all 0.4s ease;
        }

        /* Цветочный декор на фоне (очень нежный) */
        .flower-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .flower {
            position: absolute;
            opacity: 0.25;
            filter: drop-shadow(0 4px 4px rgba(70, 40, 90, 0.1));
        }

        .flower-1 { top: 3%; left: 1%; width: 130px; }
        .flower-2 { bottom: 0; right: 0; width: 200px; transform: rotate(10deg); }
        .flower-3 { top: 15%; right: 3%; width: 100px; opacity: 0.3; }
        .flower-4 { bottom: 10%; left: 2%; width: 150px; transform: rotate(-8deg); }

        /* Заголовок — цвета темно-фиолетовые */
        .title {
            text-align: center;
            margin-bottom: 25px;
        }

        .title h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: #3c1e4a; /* темно-фиолетовый */
            text-shadow: 3px 3px 0 #e6d0ff, 5px 5px 0 rgba(255, 255, 255, 0.7);
            letter-spacing: 1.5px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 2.2rem;
            color: #4b2a5a; /* темно-фиолетовый, чуть мягче */
            background: rgba(255, 240, 255, 0.6);
            display: inline-block;
            padding: 0.3rem 2.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-weight: 400;
            margin-top: 10px;
            border: 1px solid #d9c0ff;
            box-shadow: 0 4px 8px rgba(90, 50, 120, 0.1);
        }

        /* Блок с именем мамы (акцент) */
        .name-badge {
            background: #fab8f7; /* светло-фиолетовый, но текст темный */
            padding: 12px 25px;
            border-radius: 100px;
            display: inline-block;
            margin: 15px auto 5px;
            border: 3px solid #ffffffb3;
            box-shadow: 0 8px 0 #764b8e;
        }

        .name-badge span {
            font-size: 2.8rem;
            font-weight: 800;
            color: #2b103a; /* очень темный фиолет */
            letter-spacing: 4px;
        }

        /* Основное изображение (букет) */
        .hero-image {
            display: flex;
            justify-content: center;
            margin: 20px 0 25px;
            filter: drop-shadow(0 12px 10px #df97d9);
        }

        .svg-flower {
            width: 220px;
            height: auto;
        }

        /* Текст поздравления — темно-фиолетовый */
        .message {
            background: rgba(250, 240, 255, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 80px 20px 80px 20px;
            padding: 35px 35px;
            margin: 30px 0 30px;
            border: 3px dotted #c39bd3;
            box-shadow: inset 0 0 25px #f0dcff, 0 20px 25px -10px #936db0;
        }

        .message p {
            font-size: 1.9rem;
            font-weight: 500;
            color: #2e153b; /* темно-фиолет */
            line-height: 1.5;
            text-align: center;
            font-style: italic;
        }

        .message .signature {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: right;
            margin-top: 20px;
            color: #401c4f; /* темно-фиолет */
            font-style: normal;
            text-shadow: 2px 2px 0 #ebd5ff;
        }

        /* Ряд цветов-эмодзи */
        .flower-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 35px 0 15px;
        }

        .flower-icon {
            font-size: 3.5rem;
            display: inline-block;
            animation: sway 3s infinite ease-in-out;
            filter: drop-shadow(0 6px 5px #b692cf);
            transition: transform 0.2s;
            color: #4a255c; /* для текстовых эмодзи не применяется, но для совместимости */
        }

        .flower-icon:nth-child(2) { animation-delay: 0.3s; }
        .flower-icon:nth-child(3) { animation-delay: 0.6s; }
        .flower-icon:nth-child(4) { animation-delay: 0.9s; }
        .flower-icon:nth-child(5) { animation-delay: 1.2s; }

        /* Кнопка */
        .surprise-btn {
            text-align: center;
            margin: 25px 0 20px;
        }

        button {
            background: #8a6bb3; /* фиолетовый оттенок */
            border: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 16px 45px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 0 #4a2a62, 0 5px 25px #bfa0e0;
            transition: all 0.1s cubic-bezier(0.1, 0.8, 0.3, 1.2);
            border: 2px solid #f0dbff;
            letter-spacing: 1.5px;
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 6px 0 #4a2a62, 0 10px 20px #b28fce;
        }

        /* Анимации */
        @keyframes sway {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(8deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .floating {
            animation: float 5s infinite;
        }

        .heart {
            color: #712b8f; /* темно-фиолетовый с оттенком */
            font-size: 2.8rem;
            line-height: 1;
            display: inline-block;
            animation: heartbeat 1.3s infinite;
            filter: drop-shadow(0 0 8px #f2dcff);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.2); }
            35% { transform: scale(1.1); }
            45% { transform: scale(1.3); }
            55% { transform: scale(1); }
        }

        /* Блестяшки на фоне */
        .glitter {
            position: absolute;
            font-size: 1.6rem;
            user-select: none;
            z-index: 2;
            pointer-events: none;
            opacity: 0.35;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.15; transform: scale(0.8); }
            100% { opacity: 0.6; transform: scale(1.3); }
        }

        /* Адаптация для экранов */
        @media (max-width: 550px) {
            .title h1 { font-size: 2.8rem; }
            .subtitle { font-size: 1.8rem; }
            .message p { font-size: 1.5rem; }
            .card { padding: 25px 15px; }
            .name-badge span { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<!-- Плавающие цветочки и сердечки (фон) -->
<div class="glitter" style="top: 5%; left: 3%;">🌸</div>
<div class="glitter" style="top: 80%; left: 92%;">🌷</div>
<div class="glitter" style="top: 40%; left: 10%;">💜</div>
<div class="glitter" style="top: 65%; left: 85%;">🌺</div>
<div class="glitter" style="top: 20%; right: 10%;">🌹</div>
<div class="glitter" style="bottom: 15%; left: 15%;">🌼</div>
<div class="glitter" style="top: 50%; left: 45%;">✨</div>

<!-- Декоративные крупные цветы на фоне (нежно-фиолетовые) -->
<div class="flower-bg">
    <svg class="flower flower-1" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="20" fill="#C8A2E0" opacity="0.4"/>
        <circle cx="30" cy="40" r="18" fill="#D7B0ED" opacity="0.35"/>
        <circle cx="70" cy="40" r="18" fill="#D7B0ED" opacity="0.35"/>
        <circle cx="40" cy="70" r="18" fill="#D7B0ED" opacity="0.35"/>
        <circle cx="60" cy="70" r="18" fill="#D7B0ED" opacity="0.35"/>
    </svg>
    <svg class="flower flower-2" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="30" fill="#C9ADE0" opacity="0.3"/>
        <circle cx="30" cy="50" r="24" fill="#B692D0" opacity="0.3"/>
        <circle cx="90" cy="50" r="24" fill="#B692D0" opacity="0.3"/>
        <circle cx="45" cy="90" r="24" fill="#B692D0" opacity="0.3"/>
        <circle cx="75" cy="90" r="24" fill="#B692D0" opacity="0.3"/>
    </svg>
    <svg class="flower flower-3" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="18" fill="#E3C6FF" opacity="0.45"/>
        <circle cx="22" cy="30" r="15" fill="#D2B0F0" opacity="0.4"/>
        <circle cx="58" cy="30" r="15" fill="#D2B0F0" opacity="0.4"/>
    </svg>
    <svg class="flower flower-4" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="22" fill="#D5B5F0" opacity="0.4"/>
        <circle cx="28" cy="45" r="18" fill="#C5A0E0" opacity="0.4"/>
        <circle cx="72" cy="45" r="18" fill="#C5A0E0" opacity="0.4"/>
        <circle cx="50" cy="72" r="18" fill="#C5A0E0" opacity="0.4"/>
    </svg>
</div>

<!-- ОСНОВНАЯ ОТКРЫТКА -->
<div class="card">
    <div class="title">
        <h1>
            <span>🌸</span> С 8 Марта <span>🌷</span>
        </h1>
        <div class="subtitle">Дорогая мамочка!</div>
    </div>

    <!-- ИМЕННОЙ БЕЙДЖ (МАМА СВЕТА) -->
    <div style="text-align: center;">
        <div class="name-badge">
            <span>СВЕТА</span>
        </div>
    </div>

    <!-- Красивый SVG букет (в нежно-фиолетовых тонах) -->
    <div class="hero-image floating">
        <svg class="svg-flower" viewBox="0 0 150 180" fill="none">
            <!-- стебли -->
            <path d="M60 110 L70 50 L80 110" fill="#7A5D8C" opacity="0.4" />
            <path d="M80 110 L90 50 L100 110" fill="#7A5D8C" opacity="0.4" />
            <!-- бутоны (фиолетовая гамма) -->
            <circle cx="65" cy="40" r="18" fill="#C88FDD" stroke="#FFFFFF" stroke-width="3"/>
            <circle cx="85" cy="40" r="18" fill="#B47BD0" stroke="#FFFFFF" stroke-width="3"/>
            <circle cx="105" cy="55" r="16" fill="#D59FE8" stroke="#FFFFFF" stroke-width="3"/>
            <circle cx="45" cy="55" r="16" fill="#D2A0E5" stroke="#FFFFFF" stroke-width="3"/>
            <circle cx="75" cy="25" r="14" fill="#AB6FC6" stroke="#FFFFFF" stroke-width="3"/>
            <!-- серединки (желтые, для контраста) -->
            <circle cx="65" cy="40" r="7" fill="#F9E283" />
            <circle cx="85" cy="40" r="7" fill="#F9E283" />
            <circle cx="45" cy="55" r="6" fill="#FFE06B" />
            <circle cx="105" cy="55" r="6" fill="#FFE06B" />
            <circle cx="75" cy="25" r="5" fill="#FFDE70" />
            <!-- листики светло-зеленые -->
            <path d="M57 67 L40 80 L52 84" fill="#B1C69C" opacity="0.7" />
            <path d="M93 67 L110 80 L98 84" fill="#B1C69C" opacity="0.7" />
            <!-- горшочек -->
            <rect x="40" y="110" width="70" height="30" rx="10" fill="#B59AC0" stroke="#6A4B78" stroke-width="3"/>
            <ellipse cx="75" cy="140" rx="40" ry="12" fill="#7D5F8A" />
        </svg>
    </div>

    <!-- ТЕКСТ ПОЗДРАВЛЕНИЯ (С ИМЕНЕМ АРТЕМИЙ) -->
    <div class="message">
        <p>
            💜 Мамочка Света, с праздником весны! <br>
            Ты самая нежная, добрая и красивая. <br>
            Пусть каждый день дарит улыбки <br>
            и исполняет мечты. С 8 Марта! <br>
        </p>
        <div class="signature">
            ❤️ Твой сын Артемий
        </div>
    </div>

    <!-- Цветочный ряд (эмодзи) -->
    <div class="flower-row">
        <span class="flower-icon">🌷</span>
        <span class="flower-icon">🌸</span>
        <span class="flower-icon">🌺</span>
        <span class="flower-icon">🌹</span>
        <span class="flower-icon">💐</span>
        <span class="flower-icon">🌼</span>
    </div>

    <!-- КНОПКА-СЮРПРИЗ -->
    <div class="surprise-btn">
        <button id="surpriseButton">💜 Нажми скорее 💜</button>
    </div>
    
    <!-- СЕРДЕЧКО (темно-фиолетовое) -->
    <div style="text-align: center; font-size: 2.5rem; margin-top: 15px;" class="heart" id="heartContainer">💜</div>
</div>

<!-- СКРИПТ ДЛЯ СЮРПРИЗОВ -->
<script>
    (function() {
        const btn = document.getElementById('surpriseButton');
        const heartContainer = document.getElementById('heartContainer');
        
        // Массив фраз для сюрприза (с именами Света и Артемий)
        const messages = [
            "💜 Света, ты лучше всех! 💜",
            "🌸 Мамочка, счастья тебе! 🌸",
            "🌷 Артемий тебя обнимает! 🌷",
            "💐 Ты супер-мама, Света! 💐",
            "✨ Для самой лучшей мамы ✨",
            "🌺 Цвети и сияй! 🌺",
            "💜 Люблю тебя бесконечно! 💜",
            "🌹 Твоя улыбка бесценна 🌹"
        ];

        const decorations = ['🌸', '🌼', '🌺', '💮', '🏵️', '🌷', '💐', '💜', '💟', '☂️'];

        btn.addEventListener('click', function() {
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            heartContainer.innerHTML = randomMsg + ' ' + decorations[Math.floor(Math.random() * decorations.length)];
            
            // Создаем конфетти из цветочков
            for (let i = 0; i < 8; i++) {
                createFloatingEmoji();
            }
        });

        function createFloatingEmoji() {
            const emoji = document.createElement('div');
            emoji.innerText = decorations[Math.floor(Math.random() * decorations.length)];
            emoji.style.position = 'fixed';
            emoji.style.zIndex = '9999';
            emoji.style.left = Math.random() * 100 + '%';
            emoji.style.top = '90%';
            emoji.style.fontSize = (Math.random() * 34 + 20) + 'px';
            emoji.style.pointerEvents = 'none';
            emoji.style.opacity = '0.9';
            emoji.style.transition = 'all 2.2s ease-out';
            emoji.style.filter = 'drop-shadow(0 5px 8px #a56fc2)';
            document.body.appendChild(emoji);

            setTimeout(() => {
                emoji.style.transform = `translateY(-${window.innerHeight * 0.85}px) translateX(${Math.random() * 100 - 50}px) rotate(${Math.random()*360}deg)`;
                emoji.style.opacity = '0';
            }, 20);

            setTimeout(() => {
                emoji.remove();
            }, 2200);
        }

        // Эффект при наведении на цветочки
        const flowerIcons = document.querySelectorAll('.flower-icon');
        flowerIcons.forEach(icon => {
            icon.addEventListener('mouseenter', () => {
                icon.style.transform = 'scale(1.4) rotate(12deg)';
                icon.style.transition = 'transform 0.25s';
            });
            icon.addEventListener('mouseleave', () => {
                icon.style.transform = 'scale(1) rotate(0deg)';
            });
        });

        // Двойной щелчок меняет сердечко на именное
        document.body.addEventListener('dblclick', function() {
            heartContainer.innerHTML = '💜 Света + Артемий = ❤️';
            createFloatingEmoji();
            createFloatingEmoji();
        });

        // Приветственная анимация сердечка
        setTimeout(() => {
            heartContainer.style.transition = 'transform 0.5s';
            heartContainer.style.transform = 'scale(1.4)';
            setTimeout(() => heartContainer.style.transform = 'scale(1)', 500);
        }, 400);
    })();
</script>

</body>
</html>
