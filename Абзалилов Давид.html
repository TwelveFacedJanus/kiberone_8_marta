<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мамочка, с 8 марта! 💐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Playfair+Display:ital@1&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffdfbf;
            background-image: radial-gradient(circle at 30% 40%, #ffb6c1 0%, transparent 30%),
                              radial-gradient(circle at 70% 80%, #fdd0f2 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comfortaa', cursive;
            padding: 15px;
        }

        .page {
            max-width: 700px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 70px 20px 70px 20px;
            padding: 40px 35px;
            box-shadow: 0 30px 45px rgba(233, 120, 200, 0.3),
                        0 0 0 4px #fff9 inset,
                        0 0 0 8px #ffb7c5 inset;
            text-align: center;
            border: 3px solid white;
        }

        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #d64284, #922a5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 15px 0 5px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #ffe2f0;
        }

        .photo-frame {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            border: 6px solid white;
            box-shadow: 0 15px 25px #f49ac1;
            overflow: hidden;
            transition: transform 0.5s ease;
            background: #fbe4ed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame:hover {
            transform: scale(1.03) rotate(2deg);
        }

        /* Замените текст ниже на имя файла фото мамы, если хотите */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Если нет фото — покажем иконку */
        .photo-placeholder {
            font-size: 100px;
            line-height: 1;
        }

        .greeting {
            font-size: 22px;
            color: #4f2242;
            background: rgba(255, 255, 255, 0.5);
            padding: 25px 20px;
            border-radius: 60px 10px 60px 10px;
            margin: 25px 0 15px;
            border: 2px dashed #ff82b2;
            line-height: 1.7;
            font-family: 'Playfair Display', serif;
        }

        .animation-flowers {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 45px;
            margin: 15px 0;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .footer {
            font-size: 28px;
            color: #ab4275;
            margin-top: 30px;
            font-weight: bold;
            background: #fff0f5ba;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 40px;
            box-shadow: 0 7px 0 #d36b96;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>🌷 С 8 Марта 🌷</h1>

        <!-- Рамка для фото (замени content) -->
        <div class="photo-frame">
            <!-- Если есть картинка - раскомментируй строку ниже и положи фото "mama.jpg" в ту же папку -->
            <!-- <img src="mama.jpg" alt="Моя любимая мама"> -->

            <!-- А пока просто красивый placeholder -->
            <div class="photo-placeholder">💐</div>
        </div>

        <div class="animation-flowers">
            <span>🌼</span> <span>🌺</span> <span>🌸</span> <span>🌷</span> <span>🌹</span>
        </div>

        <div class="greeting">
            Дорогая мамуля! <br>
            В этот день хочу сказать спасибо <br>
            за твое тепло, нежность и доброту. <br>
            Ты мой свет в окошке и главный человек. <br>
            Пусть весна цветет в твоей душе всегда! <br>
            ❤️ С любовью, твой ребенок.
        </div>

        <div class="footer">
            💐 8 марта 2026 💐
        </div>
    </div>
</body>
</html>
