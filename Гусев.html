<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта, мама Алина 💐</title>
    <style>
        /* Подключаем нежный шрифт через Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce9f2 0%, #ffe4e9 40%, #fde0e8 100%);
            font-family: 'Quicksand', sans-serif;  /* Нежный, округлый шрифт */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Полупрозрачные цветы на заднем фоне (статичные) */
        .flower-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .flower {
            position: absolute;
            opacity: 0.25;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ffb7c5, #ff8aae);
            border-radius: 70% 30% 60% 40% / 50% 40% 60% 50%;
            transform: rotate(15deg);
            box-shadow: 0 10px 15px rgba(255, 120, 160, 0.2);
        }

        .flower::before {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffe685;
            border-radius: 60% 40% 50% 50% / 40% 50% 50% 60%;
            top: 25px;
            left: 25px;
            box-shadow: inset -2px -2px 5px #ffb347;
        }

        .flower::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 45px;
            background: #b3d9a0;
            bottom: -25px;
            left: 34px;
            transform: rotate(5deg);
            border-radius: 30% 30% 20% 20%;
        }

        /* Плавающие анимированные цветочки (дополнительное очарование) */
        .floating-flowers {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 2;
            pointer-events: none;
        }

        .float-flower {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 200, 220, 0.7);
            border-radius: 60% 40% 50% 50% / 40% 60% 40% 60%;
            box-shadow: 0 0 15px #ffc0cb;
            animation: floatAround 18s infinite ease-in-out;
        }

        .float-flower::before {
            content: "🌸";
            position: absolute;
            font-size: 28px;
            top: -5px;
            left: 5px;
            opacity: 0.8;
            transform: rotate(-10deg);
        }

        /* разные положения и задержки */
        .f1 { top: 10%; left: 5%; animation-delay: 0s; transform: scale(1.2); }
        .f2 { top: 70%; left: 85%; animation-delay: -4s; transform: scale(0.9) rotate(20deg); }
        .f3 { top: 20%; left: 90%; animation-delay: -7s; transform: scale(1.0) rotate(-15deg); }
        .f4 { top: 80%; left: 15%; animation-delay: -2s; transform: scale(1.1); }
        .f5 { top: 40%; left: 70%; animation-delay: -11s; transform: scale(1.3); }
        .f6 { top: 85%; left: 50%; animation-delay: -5s; transform: scale(0.8) rotate(30deg); }
        .f7 { top: 15%; left: 40%; animation-delay: -9s; transform: scale(1.0); }

        @keyframes floatAround {
            0% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(10px) rotate(-5deg); }
            75% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Главная карточка-поздравление */
        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 25px 40px rgba(255, 150, 180, 0.25), 0 10px 15px rgba(255, 200, 220, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.7);
            max-width: 800px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 30px 50px rgba(255, 130, 170, 0.35);
            background: rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 4rem;
            font-weight: 300;
            color: #8b4e5e;
            text-shadow: 2px 2px 15px #ffe2eb, 0 0 20px #ffffff;
            margin-bottom: 10px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .accent-name {
            font-weight: 600;
            color: #c1687a;
            background: linear-gradient(145deg, #fccfd8, #ffdae3);
            display: inline-block;
            padding: 0 25px;
            border-radius: 60px;
            font-size: 4.5rem;
            box-shadow: inset 0 -2px 5px rgba(255,255,255,0.8), 0 8px 12px rgba(255,150,170,0.2);
            margin: 10px 0 5px;
            line-height: 1.4;
        }

        .to-mom {
            font-size: 2rem;
            font-weight: 300;
            color: #a6576b;
            margin-top: 5px;
            border-bottom: 2px dashed #fbaac3;
            display: inline-block;
            padding-bottom: 8px;
        }

        .message {
            font-size: 1.7rem;
            font-weight: 300;
            color: #573f47;
            margin: 30px 0 15px;
            background: rgba(255, 240, 245, 0.7);
            padding: 20px 25px;
            border-radius: 50px 20px 50px 20px;
            line-height: 1.6;
            backdrop-filter: blur(2px);
            border: 1px solid white;
        }

        .signature {
            font-size: 2.2rem;
            font-weight: 400;
            color: #9b5b6b;
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .signature span {
            background: #fff0f5c9;
            padding: 8px 30px;
            border-radius: 100px;
            box-shadow: 0 4px 8px #ffc0cb;
            font-weight: 500;
            font-size: 2.5rem;
            border: 1px solid #ffe2f0;
        }

        .flowers-decoration {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 15px;
            flex-wrap: wrap;
        }

        .emoji-flower {
            font-size: 3.8rem;
            filter: drop-shadow(0 8px 10px #ffb6c1);
            animation: gentleWave 4s infinite ease-in-out;
            display: inline-block;
        }

        .emoji-flower:nth-child(2) { animation-delay: 0.4s; }
        .emoji-flower:nth-child(3) { animation-delay: 0.8s; }
        .emoji-flower:nth-child(4) { animation-delay: 1.2s; }
        .emoji-flower:nth-child(5) { animation-delay: 0.2s; }

        @keyframes gentleWave {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-7px) rotate(3deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .date {
            font-size: 1.5rem;
            font-weight: 300;
            color: #b16d7c;
            margin-top: 35px;
            letter-spacing: 2px;
            border-top: 1px solid #ffbfd4;
            padding-top: 20px;
            display: inline-block;
            width: 80%;
        }

        /* Маленькие цветочки-украшения вокруг карточки (ручная работа) */
        .corner-flowers {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 120px;
            height: 120px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="30" cy="30" r="18" fill="%23ffb7c5" opacity="0.6" /><circle cx="48" cy="22" r="12" fill="%23ffe48f" /><circle cx="22" cy="48" r="12" fill="%23ffa0b0" /><circle cx="50" cy="50" r="12" fill="%23ff94aa"/></svg>');
            background-size: cover;
            opacity: 0.5;
            pointer-events: none;
            z-index: 5;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .accent-name { font-size: 3.2rem; }
            .message { font-size: 1.4rem; }
            .signature span { font-size: 2rem; }
            .card { padding: 30px 15px; }
        }

        @media (max-width: 400px) {
            h1 { font-size: 2.5rem; }
            .accent-name { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Неподвижные цветы в глубине -->
    <div class="flower-bg">
        <div class="flower" style="top: 5%; left: 3%; transform: rotate(-10deg) scale(1.3);"></div>
        <div class="flower" style="top: 70%; left: 90%; transform: rotate(45deg) scale(1.7); opacity: 0.2;"></div>
        <div class="flower" style="top: 15%; left: 88%; transform: rotate(70deg) scale(1.1);"></div>
        <div class="flower" style="top: 85%; left: 8%; transform: rotate(-25deg) scale(1.5); opacity: 0.3;"></div>
        <div class="flower" style="top: 45%; left: 15%; transform: rotate(15deg) scale(1.2);"></div>
        <div class="flower" style="top: 30%; left: 75%; transform: rotate(-40deg) scale(1.4); opacity: 0.2;"></div>
    </div>

    <!-- Анимированные плывущие цветочки (с эмодзи) -->
    <div class="floating-flowers">
        <div class="float-flower f1"></div>
        <div class="float-flower f2"></div>
        <div class="float-flower f3"></div>
        <div class="float-flower f4"></div>
        <div class="float-flower f5"></div>
        <div class="float-flower f6"></div>
        <div class="float-flower f7"></div>
    </div>

    <!-- Главная открытка -->
    <div class="card">
        <!-- пара украшений по углам (текстовые) -->
        <div style="position: absolute; top: 10px; right: 25px; font-size: 2rem; opacity: 0.5; transform: rotate(15deg);">🌸</div>
        <div style="position: absolute; bottom: 10px; left: 20px; font-size: 2.8rem; opacity: 0.4; transform: rotate(-10deg);">🌼</div>

        <h1>С 8 марта,</h1>
        <div class="accent-name">мама Алина!</div>
        <div class="to-mom">🌷 для самой любимой 🌷</div>

        <!-- Гирлянда из цветов (эмодзи) -->
        <div class="flowers-decoration">
            <span class="emoji-flower">🌸</span>
            <span class="emoji-flower">🌼</span>
            <span class="emoji-flower">🌺</span>
            <span class="emoji-flower">🌷</span>
            <span class="emoji-flower">🌹</span>
            <span class="emoji-flower">🌻</span>
        </div>

        <!-- Тёплое сообщение -->
        <div class="message">
            Пускай этот весенний день подарит тебе море улыбок, <br>
            нежности и радости. Ты самая чудесная мама на свете!<br>
            🌷 Спасибо за тепло и заботу. 🌷
        </div>

        <!-- Подпись от Ильи -->
        <div class="signature">
            <span>С любовью,</span>
            <span>твой Илья ❤️</span>
        </div>

        <!-- Дополнительный цветок с именем (небольшой акцент) -->
        <div style="margin: 15px 0 5px; display: flex; justify-content: center; gap: 20px;">
            <span style="background: #ffe4ed; padding: 8px 25px; border-radius: 40px; font-weight: 500; font-size: 1.8rem; color: #a5495e; border: 1px solid white;">Алина 🌷</span>
            <span style="background: #ffe4ed; padding: 8px 20px; border-radius: 40px; font-weight: 500; font-size: 1.8rem; color: #a5495e; border: 1px solid white;">Илья 💕</span>
        </div>

        <div class="date">
            8 марта 2026
        </div>
    </div>

    <!-- Несколько абсолютных микро-цветочков (для воздуха) -->
    <div style="position: absolute; bottom: 5px; right: 10px; font-size: 35px; opacity: 0.2; transform: rotate(5deg); z-index: 15;">🌼</div>
    <div style="position: absolute; top: 15px; left: 10px; font-size: 45px; opacity: 0.2; transform: rotate(-10deg); z-index: 15;">🌸</div>
</body>
</html>
