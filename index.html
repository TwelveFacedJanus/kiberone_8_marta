<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравление детей от KIBEROne</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .student-button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .student-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #45a049, #4CAF50);
        }
        
        .student-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Поздравление детей от KIBEROne</h1>
        
        <div class="buttons-grid">
            <a href="Бурнаева.html" class="student-button">Бурнаева</a>
            <a href="Вахитов.html" class="student-button">Вахитов</a>
            <a href="Дойникова.html" class="student-button">Дойникова</a>
            <a href="ИВАНОВ.html" class="student-button">Иванов</a>
            <a href="Кабиров.html" class="student-button">Кабиров</a>
            <a href="Кадикова.html" class="student-button">Кадикова</a>
            <a href="Камалов.html" class="student-button">Камалов</a>
            <a href="Караськин.html" class="student-button">Караськин</a>
            <a href="Костриков.html" class="student-button">Костриков</a>
            <a href="Кунакбаев Рамазан.Html" class="student-button">Кунакбаев Рамазан</a>
            <a href="Лосев Дима.html" class="student-button">Лосев Дима</a>
            <a href="Лысенко.html" class="student-button">Лысенко</a>
            <a href="Муратов.html" class="student-button">Муратов</a>
            <a href="НаздрачёвНикита.html" class="student-button">Наздрачёв Никита</a>
            <a href="Неткачев даниил.html" class="student-button">Неткачев Даниил</a>
            <a href="Усманова.html" class="student-button">Усманова</a>
            <a href="муртазин.html" class="student-button">Муртазин</a>
        </div>
    </div>
</body>
</html>
