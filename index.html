        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .student-button {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            word-break: break-word;
        }
        
        .student-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #45a049, #4CAF50);
        }
        
        .student-button:active {
            transform: translateY(0);
        }
    </style>
</head>

        // Функция для удаления дубликатов по имени
        function getUniqueStudents(studentsArray) {
            const unique = {};
            studentsArray.forEach(student => {
                // Используем имя как ключ для уникальности
                // Если есть несколько файлов с одинаковым именем, берем последний
                unique[student.name] = student;
            });
            return Object.values(unique);
        }

        // Функция для сортировки по имени
        function sortStudents(studentsArray) {
            return studentsArray.sort((a, b) => a.name.localeCompare(b.name, 'ru'));
        }

        // Получаем уникальный и отсортированный список
        const uniqueStudents = sortStudents(getUniqueStudents(students));

        // Находим контейнер для кнопок
        const container = document.getElementById('buttonsContainer');

        // Создаем и добавляем кнопки на страницу
        uniqueStudents.forEach(student => {
            const button = document.createElement('a');
            button.href = student.file;
            button.className = 'student-button';
            button.textContent = student.name;
            container.appendChild(button);
        });

        // Выведем в консоль количество уникальных учеников для проверки
        console.log(`Всего уникальных учеников: ${uniqueStudents.length}`);
