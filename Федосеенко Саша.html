<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта, любимые!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbe9f0 0%, #f8e0e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 1000px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 50px 50px 40px 40px;
            box-shadow: 0 25px 40px rgba(190, 110, 140, 0.25), 0 10px 20px rgba(0,0,0,0.1);
            padding: 35px 30px 45px 30px;
            border: 2px solid #ffffff88;
            transition: 0.3s;
        }

        .main-title {
            text-align: center;
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #b23b6d, #d4648c, #e68aae);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 4px 12px rgba(210, 90, 130, 0.35);
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px #ffcfdf);
        }

        .main-title span {
            font-size: 2.2rem;
            display: inline-block;
            background: #fff2f5;
            padding: 0 18px;
            border-radius: 60px;
            -webkit-text-fill-color: #b34b74;
            color: #b34b74;
            font-weight: 500;
            box-shadow: 0 2px 10px #ffb6c1;
            margin-top: 5px;
        }

        /* Кнопка открыть открытку */
        .open-btn-wrapper {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .open-btn {
            background: linear-gradient(145deg, #b23b6d, #d4648c);
            border: none;
            padding: 22px 60px;
            border-radius: 80px;
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 5px #4d1e33;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 20px 30px #e0779f, 0 5px 15px #aa4a6e;
            transition: all 0.25s ease;
            border: 3px solid #ffeef2;
            outline: none;
        }

        .open-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 35px #d86f93, 0 8px 20px #913e5c;
            background: linear-gradient(145deg, #c44b7c, #e27fa3);
        }

        .open-btn:active {
            transform: translateY(3px);
            box-shadow: 0 15px 25px #d46d8d;
        }

        /* Основной контент открытки (изначально скрыт) */
        .greeting-content {
            display: none;
        }

        .greeting-content.show {
            display: block;
        }

        .signature-block {
            text-align: right;
            font-size: 1.7rem;
            font-weight: 600;
            color: #a53f64;
            margin: 30px 0 20px 0;
            border-bottom: 3px dashed #feb6c9;
            padding-bottom: 10px;
        }

        .signature-block span {
            background-color: #ffdee8;
            padding: 5px 25px;
            border-radius: 40px;
            display: inline-block;
            box-shadow: 0 4px 8px #ffc1d0;
        }

        /* Экран выбора имён */
        .selection-screen {
            display: block;
        }

        .selection-screen.hide {
            display: none;
        }

        .selection-title {
            font-size: 2.2rem;
            text-align: center;
            color: #982d57;
            margin-bottom: 25px;
            font-weight: 600;
            background: #ffdee8b0;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        .women-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        .woman-card {
            flex: 1 1 240px;
            min-width: 240px;
            max-width: 280px;
            border-radius: 60px 60px 40px 40px;
            padding: 25px 15px 25px 15px;
            background: white;
            box-shadow: 0 20px 30px rgba(190, 100, 130, 0.25);
            transition: 0.2s;
            border: 3px solid rgba(255,255,240,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .woman-card:hover {
            transform: translateY(-8px);
            filter: brightness(1.03);
        }

        .woman-card:active {
            transform: translateY(0px);
        }

        .woman-card.mama {
            background: #eef7ff;
            border-color: #74b9ff;
            box-shadow: 0 12px 25px #a0c4ff9f;
        }
        .woman-card.baba {
            background: #fff2f7;
            border-color: #fbaac3;
            box-shadow: 0 12px 25px #ffc0d5b0;
        }
        .woman-card.krestna {
            background: #ffefef;
            border-color: #ff9494;
            box-shadow: 0 12px 25px #ffb6b6c2;
        }

        .woman-card.mama .woman-name {
            color: #1a6392;
            background: #c5e2ff;
        }
        .woman-card.baba .woman-name {
            color: #b84b73;
            background: #ffd9e6;
        }
        .woman-card.krestna .woman-name {
            color: #b13b3b;
            background: #ffd3d3;
        }

        .woman-name {
            font-size: 2.2rem;
            font-weight: 800;
            padding: 8px 25px;
            border-radius: 50px;
            margin-bottom: 20px;
            display: inline-block;
            box-shadow: 0 5px 0 #ffffff;
            pointer-events: none; /* чтобы клик был по всей карточке */
        }

        .woman-desc {
            font-size: 1.1rem;
            margin: 5px 0;
            color: #2c3e50;
        }

        .flower-emoji {
            font-size: 2.8rem;
            filter: drop-shadow(0 6px 6px #ffbcd6);
            margin: 10px 0 5px;
            pointer-events: none;
        }

        .personal-wish {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 15px;
            padding: 10px 0;
            width: 100%;
            border-top: 2px dotted currentColor;
            pointer-events: none;
        }

        /* Экран поздравления */
        .wish-screen {
            display: none;
        }

        .wish-screen.show {
            display: block;
        }

        .back-button-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0 30px 0;
        }

        .back-btn {
            background: linear-gradient(145deg, #ffb3c6, #ff8daa);
            border: none;
            padding: 15px 40px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 2px 5px #b34b6b;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 15px 25px #f9a7b5, 0 5px 10px #d46d8d;
            transition: all 0.25s ease;
            border: 2px solid #ffeef2;
            outline: none;
        }

        .back-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 22px 30px #f990aa, 0 8px 15px #cc6e89;
            background: linear-gradient(145deg, #ffc0d0, #ff99bb);
        }

        .back-btn:active {
            transform: translateY(3px);
        }

        .wish-item {
            background: #ffeef3e0;
            border-radius: 80px 20px 80px 20px;
            padding: 30px 25px;
            border-left: 15px solid #feb0c2;
            border-right: 5px solid #fff0f5;
            font-size: 1.4rem;
            line-height: 1.6;
            color: #4f2d3b;
            box-shadow: inset 0 -5px 0 #ffc1cf, 0 10px 20px #f1ccd8;
            animation: fadeIn 0.5s ease;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wish-item p {
            margin-bottom: 20px;
            font-weight: 500;
        }

        .wish-item i {
            color: #b3466a;
            font-weight: 600;
        }

        .names-highlight {
            background: #fff0b5;
            padding: 3px 12px;
            border-radius: 30px;
            font-weight: 700;
            color: #ac3f5f;
        }

        .signature-bottom {
            text-align: center;
            margin-top: 15px;
            color: #9f4f6b;
            font-weight: 500;
            font-size: 1.3rem;
        }

        @media (max-width: 650px) {
            .main-title {
                font-size: 2.8rem;
            }
            .open-btn {
                font-size: 1.8rem;
                padding: 18px 40px;
            }
            .women-grid {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Заголовок с 8 марта (всегда виден) -->
        <div class="main-title">
            🌷 8 Марта 🌷
            <span>праздник весны</span>
        </div>

        <!-- КНОПКА "ОТКРЫТЬ ОТКРЫТКУ" (изначально видна) -->
        <div class="open-btn-wrapper" id="openBtnWrapper">
            <button class="open-btn" id="openBtn">✨ Открыть открытку ✨</button>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ ОТКРЫТКИ (скрыт до нажатия на кнопку) -->
        <div class="greeting-content" id="greetingContent">
            <div class="signature-block">
                <span>💗 от Саши с любовью 💗</span>
            </div>

            <!-- ЭКРАН ВЫБОРА ИМЁН -->
            <div class="selection-screen" id="selectionScreen">
                <div style="text-align: center;">
                    <div class="selection-title">🌟 выберите имя 🌟</div>
                </div>
                
                <div class="women-grid">
                    <!-- Мама Надя - синяя -->
                    <div class="woman-card mama" id="selectMama">
                        <div class="flower-emoji">💙🌸💙</div>
                        <div class="woman-name">Надя</div>
                        <div class="woman-desc">мамочка любимая</div>
                        <div class="personal-wish" style="color: #1f6392;">✨ синее небо ✨</div>
                    </div>

                    <!-- Баба Люба - розовая -->
                    <div class="woman-card baba" id="selectBaba">
                        <div class="flower-emoji">💗🌺💗</div>
                        <div class="woman-name">Люба</div>
                        <div class="woman-desc">бабуля родная</div>
                        <div class="personal-wish" style="color: #ba6182;">🌸 розовые пионы 🌸</div>
                    </div>

                    <!-- Крёстная Аня - красная -->
                    <div class="woman-card krestna" id="selectKrestna">
                        <div class="flower-emoji">❤️🌹❤️</div>
                        <div class="woman-name">Аня</div>
                        <div class="woman-desc">крёстная</div>
                        <div class="personal-wish" style="color: #b14040;">❤️ красные тюльпаны ❤️</div>
                    </div>
                </div>
            </div>

            <!-- ЭКРАН ПОЗДРАВЛЕНИЯ (скрыт, появляется после выбора имени) -->
            <div class="wish-screen" id="wishScreen">
                <!-- Кнопка назад (возврат к выбору имён) -->
                <div class="back-button-wrapper">
                    <button class="back-btn" id="backBtn">◀ Назад к выбору имени</button>
                </div>

                <!-- Контейнер для отображения выбранного поздравления -->
                <div id="wishDisplayContainer">
                    <!-- Сюда будет подставляться нужное поздравление через JS -->
                </div>
            </div>

            <div class="signature-bottom">
                С любовью, Саша ❤️
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Элементы интерфейса
            const openBtn = document.getElementById('openBtn');
            const openBtnWrapper = document.getElementById('openBtnWrapper');
            const greetingContent = document.getElementById('greetingContent');
            
            const selectionScreen = document.getElementById('selectionScreen');
            const wishScreen = document.getElementById('wishScreen');
            const wishDisplayContainer = document.getElementById('wishDisplayContainer');
            
            // Карточки выбора
            const selectMama = document.getElementById('selectMama');
            const selectBaba = document.getElementById('selectBaba');
            const selectKrestna = document.getElementById('selectKrestna');
            
            // Кнопка назад
            const backBtn = document.getElementById('backBtn');

            // Тексты поздравлений для каждой (с цветовым оформлением)
            const wishes = {
                mama: `
                    <div class="wish-item" style="border-left-color: #1a6392; background: #eef7ff;">
                        <p>🌷 <span class="names-highlight">Мама Надя</span>! 🌷</p>
                        <p>С международным женским днём! Спасибо тебе за бесконечную нежность и заботу. Ты — мой пример силы и доброты. Пусть твоё сердце всегда согревает синее весеннее небо, а каждый день дарит только радость и улыбки.</p>
                        <p><i>Твоя любовь для меня — как синий океан спокойствия и верности.</i> Будь счастлива, здорова и красива!</p>
                        <p style="text-align: right; font-size: 2rem;">💙🌊💐</p>
                    </div>
                `,
                baba: `
                    <div class="wish-item" style="border-left-color: #b84b73; background: #fff2f7;">
                        <p>🌷 <span class="names-highlight">Баба Люба</span>! 🌷</p>
                        <p>С 8 марта, моя родная! Спасибо за твою мудрость, доброту и самые тёплые воспоминания детства. Ты — как нежный розовый пион, который согревает всех вокруг.</p>
                        <p><i>Пусть каждый день будет таким же прекрасным, как ты.</i> Крепкого здоровья, весеннего настроения и море цветов!</p>
                        <p style="text-align: right; font-size: 2rem;">💗🌸🎀</p>
                    </div>
                `,
                krestna: `
                    <div class="wish-item" style="border-left-color: #b13b3b; background: #ffefef;">
                        <p>🌷 <span class="names-highlight">Крёстная Аня</span>! 🌷</p>
                        <p>С праздником весны, дорогая крёстная! Благодарю тебя за поддержку, тепло и веру в меня. Твоя энергия и жизнелюбие вдохновляют — как красные тюльпаны, полные страсти и жизни.</p>
                        <p><i>Оставайся такой же яркой, активной и счастливой.</i> Люблю тебя!</p>
                        <p style="text-align: right; font-size: 2rem;">❤️🔥🌹</p>
                    </div>
                `
            };

            // Открываем открытку при клике на кнопку
            openBtn.addEventListener('click', function() {
                openBtnWrapper.style.display = 'none';  // скрываем кнопку
                greetingContent.classList.add('show');   // показываем контент открытки
            });

            // Функция показа выбора имён (скрывает поздравление, показывает выбор)
            function showSelection() {
                selectionScreen.classList.remove('hide');
                wishScreen.classList.remove('show');
            }

            // Функция показа поздравления (скрывает выбор, показывает экран поздравления)
            function showWishScreen(wishKey) {
                selectionScreen.classList.add('hide');
                // Вставляем нужное поздравление в контейнер
                if (wishKey === 'mama') {
                    wishDisplayContainer.innerHTML = wishes.mama;
                } else if (wishKey === 'baba') {
                    wishDisplayContainer.innerHTML = wishes.baba;
                } else if (wishKey === 'krestna') {
                    wishDisplayContainer.innerHTML = wishes.krestna;
                }
                wishScreen.classList.add('show');
            }

            // Обработчики кликов на карточки имён
            selectMama.addEventListener('click', function() {
                showWishScreen('mama');
            });

            selectBaba.addEventListener('click', function() {
                showWishScreen('baba');
            });

            selectKrestna.addEventListener('click', function() {
                showWishScreen('krestna');
            });

            // Кнопка назад - возвращает к выбору имён
            backBtn.addEventListener('click', function() {
                showSelection();
            });

            // При загрузке скрываем контент открытки (показываем только кнопку)
            greetingContent.classList.remove('show');
            // Убеждаемся что экран выбора виден (по умолчанию), а поздравление скрыто
            selectionScreen.classList.remove('hide');
            wishScreen.classList.remove('show');
        })();
    </script>
</body>
</html>
