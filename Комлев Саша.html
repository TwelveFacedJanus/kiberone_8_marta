<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта! 🌷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fbc2c2 0%, #f8e0e0 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* летающие цветочки (мелкие) */
        .floating-petals {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background: rgba(255, 240, 245, 0.6);
            width: 20px;
            height: 20px;
            border-radius: 80% 0 80% 0;
            transform: rotate(45deg);
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.2);
            animation: floatPetals 15s infinite linear;
        }

        .petal:nth-child(1) { top: 10%; left: 5%; animation-duration: 14s; opacity: 0.5; background: #ffb7c5; }
        .petal:nth-child(2) { top: 70%; left: 85%; animation-duration: 18s; opacity: 0.4; background: #faa0b5; width: 25px; height: 25px; }
        .petal:nth-child(3) { top: 20%; left: 90%; animation-duration: 20s; opacity: 0.3; background: #ffc0cb; width: 18px; height: 18px; }
        .petal:nth-child(4) { top: 80%; left: 15%; animation-duration: 12s; opacity: 0.5; background: #ffa5b9; }
        .petal:nth-child(5) { top: 40%; left: 45%; animation-duration: 22s; opacity: 0.25; background: #ffb7c5; width: 30px; height: 30px; }
        .petal:nth-child(6) { top: 15%; left: 60%; animation-duration: 17s; opacity: 0.4; background: #ff99aa; }
        .petal:nth-child(7) { top: 60%; left: 25%; animation-duration: 19s; background: #ffc2d1; opacity: 0.35; }

        @keyframes floatPetals {
            0% { transform: rotate(45deg) translateY(0) translateX(0); opacity: 0.2; }
            25% { transform: rotate(60deg) translateY(-40px) translateX(20px); opacity: 0.5; }
            50% { transform: rotate(30deg) translateY(-70px) translateX(-10px); opacity: 0.3; }
            75% { transform: rotate(50deg) translateY(-30px) translateX(-30px); opacity: 0.5; }
            100% { transform: rotate(45deg) translateY(0) translateX(0); opacity: 0.2; }
        }

        .card {
            position: relative;
            z-index: 10;
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 50px rgba(210, 70, 120, 0.25), 0 10px 25px rgba(0,0,0,0.1), inset 0 2px 8px rgba(255,255,255,0.8);
            padding: 30px 30px 40px 30px;
            border: 2px solid rgba(255, 220, 240, 0.9);
            transition: 0.4s;
        }

        .card:hover {
            box-shadow: 0 35px 60px rgba(200, 80, 140, 0.4);
            transform: scale(1.01);
        }

        /* тюльпаны / декоративные цветы сверху */
        .flower-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .flower {
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 8px 10px rgba(240, 128, 160, 0.3));
        }

        .bloom {
            display: flex;
            gap: 2px;
            justify-content: center;
            align-items: flex-end;
        }

        .petal-flower {
            width: 35px;
            height: 50px;
            background: #ff80a5;
            border-radius: 50% 50% 40% 40%;
            transform: rotate(-5deg);
            margin-bottom: -8px;
            box-shadow: inset -2px -4px 8px #d94f7a, 0 8px 12px rgba(199, 80, 120, 0.3);
            border: 1px solid #ffb3c6;
        }

        .petal-flower:nth-child(2) {
            background: #ff99bb;
            height: 60px;
            width: 38px;
            transform: rotate(0deg);
            z-index: 3;
        }

        .petal-flower:nth-child(3) {
            background: #ff70a0;
            transform: rotate(5deg);
        }

        .stem {
            width: 8px;
            height: 50px;
            background: #8fbc8f;
            border-radius: 4px;
            margin-top: -5px;
            box-shadow: 0 6px 4px #b3d9b3;
        }

        .leaf {
            width: 24px;
            height: 16px;
            background: #99cc99;
            border-radius: 80% 0 60% 20%;
            transform: rotate(20deg);
            margin-top: -12px;
            margin-right: -18px;
            align-self: flex-end;
            box-shadow: -2px -2px 6px #c1e0c1;
        }

        /* текст и основное содержание */
        .greeting {
            text-align: center;
            margin: 25px 0 20px;
        }

        .greeting h1 {
            font-size: 3.3rem;
            background: linear-gradient(135deg, #b34180, #d45d79, #e75480);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-shadow: 0 4px 15px rgba(240, 120, 160, 0.3);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .greeting p {
            font-size: 1.7rem;
            color: #a63b5e;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.5);
            display: inline-block;
            padding: 8px 30px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 2px 6px white, 0 4px 12px #fbb0c0;
            margin-top: 6px;
        }

        .message-box {
            background: rgba(255, 250, 250, 0.8);
            border-radius: 50px;
            padding: 30px 25px;
            margin: 30px 0 20px;
            border: 3px dashed #ffb6c1;
            box-shadow: inset 0 0 0 4px white, 0 10px 20px #fec5d9;
        }

        .verse {
            font-size: 1.5rem;
            color: #882d52;
            font-style: italic;
            text-align: center;
            line-height: 1.6;
            font-weight: 500;
        }

        .verse span {
            display: block;
            margin-top: 15px;
            font-size: 1.7rem;
            font-style: normal;
            font-weight: 600;
            color: #ba2d63;
            text-shadow: 0 2px 6px #ffbfd6;
        }

        .decor-line {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 15px;
        }

        .decor-line .heart {
            font-size: 2rem;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 12px red; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        .btn {
            background: linear-gradient(145deg, #ff99bb, #ffb3c6);
            border: none;
            color: white;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 16px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 18px 25px -8px #e5739b, 0 4px 12px #fbc1d0, inset 0 -2px 2px #ffeef2;
            transition: 0.2s;
            display: block;
            margin: 30px auto 15px;
            border: 2px solid white;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: linear-gradient(145deg, #ff8cb0, #ffa5bd);
            box-shadow: 0 22px 30px -6px #db6f93, 0 6px 14px #ffb7c5;
            transform: translateY(-5px);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 10px 20px -5px #d9799b;
        }

        .footer-note {
            text-align: center;
            color: #af5881;
            font-size: 1.3rem;
            margin-top: 25px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer-note span {
            background: #ffeef2;
            padding: 6px 20px;
            border-radius: 60px;
            box-shadow: inset 0 1px 5px #ffd9e5;
        }

        /* дополнительные милые детали */
        .confetti {
            font-size: 2rem;
            line-height: 1;
            user-select: none;
        }

        /* адаптивность */
        @media (max-width: 550px) {
            .greeting h1 {
                font-size: 2.8rem;
            }
            .greeting p {
                font-size: 1.4rem;
            }
            .verse {
                font-size: 1.2rem;
            }
            .btn {
                font-size: 1.4rem;
                padding: 14px 30px;
            }
            .flower-row {
                gap: 10px;
            }
            .petal-flower {
                width: 25px;
                height: 40px;
            }
        }

        /* для красоты — блеск */
        .shimmer {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent 70%);
        }

        .signature {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #bd6788;
        }
    </style>
</head>
<body>
    <!-- летающие лепестки фон -->
    <div class="floating-petals">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
    </div>

    <main class="card">
        <!-- цветочная гирлянда сверху -->
        <div class="flower-row">
            <div class="flower">
                <div class="bloom">
                    <div class="petal-flower"></div>
                    <div class="petal-flower"></div>
                    <div class="petal-flower"></div>
                </div>
                <div class="stem"></div>
                <div class="leaf"></div>
            </div>
            <div class="flower">
                <div class="bloom">
                    <div class="petal-flower" style="background: #f9b8c4;"></div>
                    <div class="petal-flower" style="background: #ffa5b9; height: 63px;"></div>
                    <div class="petal-flower" style="background: #fb90aa;"></div>
                </div>
                <div class="stem"></div>
                <div class="leaf" style="transform: rotate(-10deg); margin-right: 6px;"></div>
            </div>
            <div class="flower">
                <div class="bloom">
                    <div class="petal-flower" style="background: #ffa2c0;"></div>
                    <div class="petal-flower" style="background: #ffb7c5; height: 58px;"></div>
                    <div class="petal-flower" style="background: #f994b5;"></div>
                </div>
                <div class="stem"></div>
                <div class="leaf" style="align-self: flex-start; margin-left: 12px;"></div>
            </div>
        </div>

        <!-- заголовок и поздравление -->
        <div class="greeting">
            <h1>С 8 Марта!</h1>
            <p>🌷 Дорогая мама 🌷</p>
        </div>

        <!-- основное пожелание в рамочке -->
        <div class="message-box">
            <div class="verse">
                “Пусть в этот день весенними лучами<br>
                Вам улыбнутся счастье и тепло,<br>
                И все тревоги, все печали<br>
                Растают в мире, как стекло.<br>
                Цветов, любви, очарования,<br>
                Тепла, заботы, понимания!”
                <span>🌸 С праздником! 🌸</span>
            </div>
        </div>

        <!-- декоративные сердечки и цветы -->
        <div class="decor-line">
            <span class="heart">❤️</span>
            <span class="heart">🌺</span>
            <span class="heart">💐</span>
            <span class="heart">🌷</span>
            <span class="heart">❤️</span>
        </div>

        <!-- интерактивная кнопка с сюрпризом (показывает доп. сообщение) -->
        <button class="btn" id="surpriseBtn">Нажми 💌</button>

        <!-- скрытое сообщение появится после нажатия -->
        <div id="hiddenMessage" style="text-align: center; font-size: 1.7rem; color: #bc5984; margin-top: 15px; min-height: 50px; font-weight: 600; transition: 0.3s; opacity: 0.9;">
            <!-- заполняется js -->
        </div>

        <!-- нижний колонтитул с пожеланием -->
        <div class="footer-note">
            <span>✨ Радости, улыбок, весеннего настроения ✨</span>
        </div>
        <div class="signature" style="text-align: center; opacity: 0.6;">
            💖 8 марта 2026 💖
        </div>
    </main>

    <script>
        (function() {
            const surpriseBtn = document.getElementById('surpriseBtn');
            const hiddenDiv = document.getElementById('hiddenMessage');
            const messages = [
                "🌼 Будьте счастливы каждый день! 🌼",
                "🌷 Море цветов и комплиментов! 🌷",
                "💐 Пусть сбудутся мечты! 💐",
                "🌸 Любви, нежности и весеннего тепла! 🌸",
                "🍃 Сияйте ярче солнца! 🍃",
                "✨ Вы прекрасны! С праздником! ✨"
            ];
            let currentMsgIndex = 0;

            surpriseBtn.addEventListener('click', function() {
                // показываем сообщение по кругу
                hiddenDiv.textContent = messages[currentMsgIndex % messages.length];
                hiddenDiv.style.opacity = '1';
                hiddenDiv.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    hiddenDiv.style.transform = 'scale(1)';
                }, 150);

                // маленький дополнительный эффект — меняем фон кнопки на время
                surpriseBtn.style.background = 'linear-gradient(145deg, #ffb0c3, #ffc0d5)';
                setTimeout(() => {
                    surpriseBtn.style.background = 'linear-gradient(145deg, #ff99bb, #ffb3c6)';
                }, 200);

                currentMsgIndex++;
            });

            // опционально приветственное сообщение или первоначальное скрыто
            hiddenDiv.textContent = '💕 Нажми на кнопку для пожелания 💕';
            hiddenDiv.style.fontSize = '1.4rem';
            hiddenDiv.style.opacity = '0.8';
        })();
    </script>
</body>
</html>
