<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта!</title>
    <style>
        /* Сброс отступов и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbc2c2 0%, #f8e0e0 70%, #fff3f3 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Главный контейнер открытки */
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 25px 45px rgba(210, 70, 120, 0.25),
                        0 10px 20px rgba(0, 0, 0, 0.1),
                        inset 0 2px 5px rgba(255, 255, 255, 0.8);
            padding: 32px 28px 42px 28px;
            border: 1px solid rgba(255, 220, 240, 0.7);
            position: relative;
            z-index: 5;
            transition: all 0.3s ease;
        }

        /* Декоративные цветы на фоне */
        .floral-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .flower {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #ffb3c6, #ff80a5);
            border-radius: 70% 30% 60% 40% / 40% 60% 30% 70%;
            opacity: 0.2;
            transform: rotate(15deg);
            filter: blur(2px);
        }

        .flower1 { width: 150px; height: 130px; top: -20px; left: -40px; background: #ff9eb5; opacity: 0.15; }
        .flower2 { width: 200px; height: 180px; bottom: -40px; right: -50px; background: #fcc2d7; opacity: 0.2; transform: rotate(75deg); }
        .flower3 { width: 100px; height: 120px; top: 40%; left: 80%; background: #ffb3d1; opacity: 0.1; }

        /* Верхний венок из цветов */
        .flower-wreath {
            display: flex;
            justify-content: center;
            gap: 12px 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .bloom {
            background: #ffc0cb;
            width: 48px;
            height: 48px;
            border-radius: 60% 40% 70% 30%;
            box-shadow: 0 6px 12px #fbaac3, 0 0 0 3px #ffeef2 inset;
            transform: rotate(10deg);
            position: relative;
        }

        .bloom::before {
            content: "🌸";
            position: absolute;
            font-size: 24px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 2px 5px #ffffff;
        }

        .bloom:nth-child(2) { background: #ffb6d9; transform: rotate(-5deg) scale(1.1); }
        .bloom:nth-child(3) { background: #f9b8c4; transform: rotate(20deg); }
        .bloom:nth-child(4) { background: #e6b8ff; }
        .bloom:nth-child(5) { background: #ffb3b3; }

        /* Заголовок */
        .title {
            font-size: 2.9rem;
            font-weight: 800;
            text-align: center;
            color: #942d5c;
            text-shadow: 4px 4px 0 #ffcfd5, 2px 2px 15px #ffffff;
            letter-spacing: 2px;
            word-break: break-word;
            line-height: 1.2;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 1.4rem;
            text-align: center;
            color: #b3587a;
            font-weight: 400;
            background: #fff4f7cc;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            margin: 10px auto 20px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 8px #ffc1d0;
            border: 1px solid #ffe2ec;
        }

        /* Букет (иллюстрация) */
        .bouquet {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin: 30px 0 30px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tulip {
            width: 60px;
            height: 100px;
            background: #da7297;
            border-radius: 70% 70% 30% 30% / 80% 80% 20% 20%;
            transform: rotate(-5deg);
            box-shadow: -3px -2px 0 #b14e72 inset, 0 8px 0 #a14263 inset;
            position: relative;
        }

        .tulip::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 40px;
            background: #6b8c5c;
            bottom: -30px;
            left: 20px;
            border-radius: 20% 20% 40% 40%;
            transform: rotate(2deg);
            box-shadow: 0 6px 0 #3f5e32;
        }

        .tulip.greenish {
            background: #efb0c9;
            box-shadow: -3px -2px 0 #cf8aa8 inset, 0 8px 0 #b16f8f inset;
            height: 120px;
            width: 70px;
        }

        .tulip.greenish::after { background: #4d6b3f; }

        .tulip.pink-light {
            background: #ffb7c5;
            height: 90px;
            width: 55px;
        }

        .tulip.pink-light::after { background: #57853d; width: 14px; left: 18px; }

        /* Листики вокруг букета */
        .leaf {
            background: #95aa6d;
            width: 30px;
            height: 55px;
            border-radius: 90% 0 60% 20%;
            transform: rotate(-30deg);
            margin-bottom: 10px;
            box-shadow: 0 8px 0 #657e41;
        }

        .leaf.right {
            transform: rotate(40deg) scaleX(-1);
            background: #a5bf79;
        }

        /* Поздравительный текст */
        .greeting {
            font-size: 1.4rem;
            color: #4f2d3f;
            background: #fff0f5dd;
            padding: 22px 20px;
            border-radius: 70px 70px 70px 20px;
            line-height: 1.6;
            text-align: center;
            box-shadow: 0 12px 0 #ffbcd2, 0 10px 20px #ffb0c390;
            margin: 30px 0 25px;
            border: 2px solid white;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        .signature {
            text-align: right;
            font-size: 1.8rem;
            font-style: italic;
            color: #ad4b6e;
            padding-right: 15px;
            font-weight: 600;
            text-shadow: 1px 1px 0 #ffdae9;
            margin-top: 20px;
        }

        .signature span {
            font-size: 1rem;
            display: block;
            color: #a55e7a;
            letter-spacing: 1px;
        }

        /* кнопка-сюрприз */
        .surprise-btn {
            background: #ff98b9;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 14px 30px;
            border-radius: 50px;
            color: white;
            text-shadow: 0 2px 0 #b1476b;
            box-shadow: 0 10px 0 #b34b6b, 0 5px 15px #fd9cb9;
            cursor: pointer;
            transition: all 0.07s ease;
            margin: 15px auto 0;
            display: block;
            border: 2px solid #ffe2f0;
            letter-spacing: 1px;
        }

        .surprise-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #b34b6b, 0 8px 12px #fbb0c7;
        }

        /* маленькие сердечки (плавают) */
        .heart {
            color: #ff80b0;
            font-size: 1.5rem;
            position: absolute;
            filter: drop-shadow(0 0 4px #ffb6d9);
            animation: float 3s infinite alternate ease-in-out;
            z-index: 6;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-20px) rotate(8deg); opacity: 1; }
        }

        /* Адаптация под маленькие экраны */
        @media (max-width: 480px) {
            .title { font-size: 2.2rem; }
            .greeting { font-size: 1.2rem; }
            .flower-wreath { gap: 5px; }
            .bloom { width: 38px; height: 38px; }
        }
    </style>
</head>
<body>
    <!-- Плавающие сердечки (фон) -->
    <div class="heart" style="top: 10%; left: 3%;">❤️</div>
    <div class="heart" style="top: 18%; right: 2%; font-size: 2rem; animation-delay: 0.5s;">🌸</div>
    <div class="heart" style="bottom: 15%; left: 6%; animation-delay: 1s;">🌷</div>
    <div class="heart" style="bottom: 25%; right: 7%; font-size: 2rem;">💐</div>

    <!-- Абстрактные цветы на заднем плане -->
    <div class="floral-bg">
        <div class="flower flower1"></div>
        <div class="flower flower2"></div>
        <div class="flower flower3"></div>
    </div>

    <!-- ОСНОВНАЯ ОТКРЫТКА -->
    <div class="card">
        <!-- Венок из цветов сверху -->
        <div class="flower-wreath">
            <div class="bloom"></div>
            <div class="bloom"></div>
            <div class="bloom"></div>
            <div class="bloom"></div>
            <div class="bloom"></div>
        </div>

        <!-- Главный заголовок -->
        <h1 class="title">С 8 марта!</h1>
        <div style="text-align: center;">
            <span class="sub-title">💐 Весна пришла 💐</span>
        </div>

        <!-- Букет тюльпанов (стилизован) -->
        <div class="bouquet">
            <div class="leaf"></div>
            <div class="tulip"></div>
            <div class="tulip greenish"></div>
            <div class="tulip pink-light"></div>
            <div class="leaf right"></div>
        </div>

        <!-- Тёплые слова -->
        <div class="greeting">
            🌷 Дорогие и любимые женщины! 🌷<br>
            Пусть каждый день дарит улыбки,<br>
            цветы и весеннее тепло.<br>
            С праздником весны и красоты!
        </div>

        <!-- Подпись -->
        <div class="signature">
            💖 С любовью
            <span>ваш маленький букет в коде</span>
        </div>

        <!-- Кнопка-сюрприз (при нажатии меняет текст) -->
        <button class="surprise-btn" id="surpriseButton">Нажми для пожелания ✨</button>
    </div>

    <!-- маленький скрипт для интерактива -->
    <script>
        (function() {
            const btn = document.getElementById('surpriseButton');
            const greetings = [
                '✨ Будьте счастливы каждый день! ✨',
                '🌸 Море цветов и улыбок! 🌸',
                '💐 Пусть исполняются мечты! 💐',
                '🌺 Вы прекрасны! С 8 марта! 🌺',
                '🌷 Любви, радости, тепла! 🌷',
                '🍃 Весеннего настроения! 🍃'
            ];
            let index = 0;
            btn.addEventListener('click', function() {
                // меняем текст на кнопке и цвет настроения
                btn.textContent = greetings[index % greetings.length];
                // дополнительная анимация - легкое покачивание
                btn.style.transform = 'scale(0.98)';
                setTimeout(() => btn.style.transform = '', 150);
                index++;
                // меняем фон карточки чуть-чуть (игриво)
                document.querySelector('.card').style.backgroundColor = 'rgba(255, 240, 245, 0.85)';
                setTimeout(() => document.querySelector('.card').style.backgroundColor = '', 300);
            });

            // добавим ещё один маленький эффект: двойное нажатие выводит confetti - просто alert (символически)
            btn.addEventListener('dblclick', function() {
                alert('🌹🌹🌹 С праздником! 🌹🌹🌹');
            });
        })();
    </script>
</body>
</html>
