<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, мама Оксана! 💐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f8ede3 0%, #fadadd 70%, #fce4e9 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Цветы на фоне (розы и лилии) */
        .floral-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .flower {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 8px 12px rgba(199, 113, 143, 0.2));
        }

        .rose {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23f7a8b8" d="M50 30c-8-12-24-10-28 2-2 6 1 13 7 17-5 4-9 11-6 18 4 10 17 12 27 5 10 7 23 5 27-5 3-7-1-14-6-18 6-4 9-11 7-17-4-12-20-14-28-2z"/><path fill="%23f75c7e" d="M48 32c-6-9-18-7-20 2-1 4 1 9 5 12-3 3-6 8-4 13 3 7 12 9 19 4 7 5 16 3 19-4 2-5-1-10-4-13 4-3 6-8 5-12-2-9-14-11-20-2z"/><circle fill="%23ffe082" cx="48" cy="42" r="3"/><circle fill="%23ffe082" cx="58" cy="44" r="3"/></svg>');
            width: 100px;
            height: 100px;
        }

        .lily {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23fde4c2" d="M50 20 L58 40 L50 60 L42 40 Z" /><path fill="%23ffd966" d="M50 20 L60 35 L55 50 L45 50 L40 35 Z" /><path fill="%23f9cb9c" d="M48 38 L52 38 L50 58 L48 58 Z" /><circle fill="%23cc9c6b" cx="50" cy="42" r="4"/><path fill="%2385b86b" d="M42 62 Q50 72 58 62" stroke="%23628a4b" stroke-width="2" fill="none"/></svg>');
            width: 100px;
            height: 100px;
        }

        /* карточка-поздравление */
        .card {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px 60px 60px 60px;
            box-shadow: 0 30px 50px rgba(190, 80, 120, 0.25),
                        0 10px 25px rgba(0,0,0,0.1),
                        inset 0 0 0 2px rgba(255,255,255,0.6);
            padding: 35px 30px 45px;
            transition: transform 0.3s ease;
            animation: cardGlow 4s infinite alternate;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 30px 50px rgba(210, 90, 140, 0.2), 0 10px 25px rgba(0,0,0,0.1), inset 0 0 0 2px rgba(255,240,245,0.9); }
            100% { box-shadow: 0 40px 70px rgba(220, 120, 170, 0.5), 0 15px 30px rgba(0,0,0,0.15), inset 0 0 0 4px rgba(255,255,255,0.8); }
        }

        /* украшения шапки */
        .header-flowers {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .header-flowers span {
            font-size: 3.4rem;
            line-height: 1;
            filter: drop-shadow(2px 4px 8px #e6a5b5);
            animation: float 3s ease-in-out infinite;
        }

        .header-flowers span:nth-child(2) {
            animation-delay: 0.3s;
            font-size: 4rem;
        }
        .header-flowers span:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #982c5f;
            text-align: center;
            text-shadow: 2px 2px 0 #fce1e9, 4px 4px 0 rgba(250, 170, 200, 0.4);
            letter-spacing: 1px;
            word-break: break-word;
            margin-bottom: 10px;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .sub-title {
            text-align: center;
            font-size: 1.7rem;
            font-weight: 300;
            color: #ac4f77;
            margin-bottom: 20px;
            font-style: italic;
            background: rgba(255, 215, 225, 0.5);
            display: inline-block;
            padding: 0.2rem 2rem;
            border-radius: 60px;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            backdrop-filter: blur(4px);
            border: 1px solid #ffc0cb;
        }

        .message {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            padding: 30px 25px;
            margin: 20px 0 25px;
            border: 2px solid white;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.8), 0 10px 20px rgba(160, 100, 120, 0.15);
            font-size: 1.3rem;
            line-height: 1.6;
            color: #48243b;
            text-align: center;
            font-weight: 400;
            word-break: break-word;
        }

        .message i {
            display: block;
            margin-top: 20px;
            font-size: 1.5rem;
            color: #b3436b;
        }

        .flower-bouquet {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 20px;
            flex-wrap: wrap;
        }

        .bouquet-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 240, 245, 0.7);
            border-radius: 40px;
            padding: 15px 20px;
            border: 2px solid #ffb6c1;
            box-shadow: 0 8px 0 #d48c9c;
            transition: all 0.15s ease;
            min-width: 120px;
        }

        .bouquet-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #d48c9c;
        }

        .bouquet-item span {
            font-size: 3rem;
            filter: drop-shadow(2px 4px 4px #ba7a8a);
        }

        .bouquet-item p {
            font-weight: 600;
            color: #941f53;
            margin-top: 5px;
            font-size: 1.2rem;
        }

        .signature {
            text-align: right;
            font-size: 1.7rem;
            font-family: 'Brush Script MT', cursive, sans-serif;
            color: #ad4e72;
            margin-top: 15px;
            padding-right: 15px;
            text-shadow: 1px 1px 2px white;
            border-top: 2px dashed #fbaac3;
            padding-top: 20px;
        }

        .signature span {
            background: #fff0f3;
            padding: 5px 20px;
            border-radius: 40px;
            display: inline-block;
        }

        .audio-control {
            display: flex;
            justify-content: center;
            margin: 25px 0 0;
        }

        .audio-btn {
            background: #f8c9d9;
            border: 3px solid white;
            color: #861f49;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b4738f, 0 8px 18px #e3a7bb;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            gap: 12px;
            border: none;
            outline: none;
        }

        .audio-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b4738f, 0 5px 12px #e3a7bb;
        }

        /* розы и лилии в углах (поверх фона) */
        .corner-flower {
            position: fixed;
            width: 150px;
            height: 150px;
            z-index: 5;
            opacity: 0.8;
            pointer-events: none;
        }

        .corner-1 { top: 10px; left: 10px; transform: rotate(-15deg); }
        .corner-2 { bottom: 10px; right: 10px; transform: rotate(25deg); }
        .corner-3 { top: 20px; right: 30px; width: 110px; height: 110px; transform: rotate(45deg); }
        .corner-4 { bottom: 40px; left: 20px; width: 130px; height: 130px; transform: rotate(-30deg); }

        /* адаптация */
        @media (max-width: 500px) {
            h1 { font-size: 2rem; }
            .sub-title { font-size: 1.3rem; }
            .message { font-size: 1.1rem; padding: 20px; }
            .bouquet-item { min-width: 100px; padding: 10px; }
        }
    </style>
</head>
<body>
    <!-- Разлетевшиеся цветы на фоне (статические) -->
    <div class="floral-bg">
        <div class="flower rose" style="top: 5%; left: 2%; width: 120px; height: 120px; opacity: 0.5;"></div>
        <div class="flower lily" style="bottom: 12%; right: 1%; width: 140px; height: 140px; opacity: 0.5; transform: rotate(20deg);"></div>
        <div class="flower rose" style="top: 20%; right: 8%; width: 90px; height: 90px; opacity: 0.5; transform: rotate(-10deg);"></div>
        <div class="flower lily" style="bottom: 25%; left: 7%; width: 110px; height: 110px; opacity: 0.5; transform: rotate(40deg);"></div>
        <div class="flower rose" style="top: 60%; left: 15%; width: 80px; height: 80px; opacity: 0.4;"></div>
        <div class="flower lily" style="bottom: 5%; left: 25%; width: 100px; height: 100px; opacity: 0.4; transform: rotate(70deg);"></div>
    </div>

    <!-- Дополнительные крупные цветы по углам (розы и лилии) -->
    <div class="corner-flower corner-1 rose" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><path fill=\"%23f9a8b8\" d=\"M50 30c-8-12-24-10-28 2-2 6 1 13 7 17-5 4-9 11-6 18 4 10 17 12 27 5 10 7 23 5 27-5 3-7-1-14-6-18 6-4 9-11 7-17-4-12-20-14-28-2z\"/><path fill=\"%23f75c7e\" d=\"M48 32c-6-9-18-7-20 2-1 4 1 9 5 12-3 3-6 8-4 13 3 7 12 9 19 4 7 5 16 3 19-4 2-5-1-10-4-13 4-3 6-8 5-12-2-9-14-11-20-2z\"/><circle fill=\"%23ffe082\" cx=\"48\" cy=\"42\" r=\"3\"/><circle fill=\"%23ffe082\" cx=\"58\" cy=\"44\" r=\"3\"/></svg>');"></div>
    <div class="corner-flower corner-2 lily" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><path fill=\"%23fde4c2\" d=\"M50 20 L58 40 L50 60 L42 40 Z\" /><path fill=\"%23ffd966\" d=\"M50 20 L60 35 L55 50 L45 50 L40 35 Z\" /><path fill=\"%23f9cb9c\" d=\"M48 38 L52 38 L50 58 L48 58 Z\" /><circle fill=\"%23cc9c6b\" cx=\"50\" cy=\"42\" r=\"4\"/><path fill=\"%2385b86b\" d=\"M42 62 Q50 72 58 62\" stroke=\"%23628a4b\" stroke-width=\"2\" fill=\"none\"/></svg>');"></div>
    <div class="corner-flower corner-3 rose" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><path fill=\"%23f9a8b8\" d=\"M50 30c-8-12-24-10-28 2-2 6 1 13 7 17-5 4-9 11-6 18 4 10 17 12 27 5 10 7 23 5 27-5 3-7-1-14-6-18 6-4 9-11 7-17-4-12-20-14-28-2z\"/><path fill=\"%23f75c7e\" d=\"M48 32c-6-9-18-7-20 2-1 4 1 9 5 12-3 3-6 8-4 13 3 7 12 9 19 4 7 5 16 3 19-4 2-5-1-10-4-13 4-3 6-8 5-12-2-9-14-11-20-2z\"/><circle fill=\"%23ffe082\" cx=\"48\" cy=\"42\" r=\"3\"/><circle fill=\"%23ffe082\" cx=\"58\" cy=\"44\" r=\"3\"/></svg>');"></div>
    <div class="corner-flower corner-4 lily" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><path fill=\"%23fde4c2\" d=\"M50 20 L58 40 L50 60 L42 40 Z\" /><path fill=\"%23ffd966\" d=\"M50 20 L60 35 L55 50 L45 50 L40 35 Z\" /><path fill=\"%23f9cb9c\" d=\"M48 38 L52 38 L50 58 L48 58 Z\" /><circle fill=\"%23cc9c6b\" cx=\"50\" cy=\"42\" r=\"4\"/><path fill=\"%2385b86b\" d=\"M42 62 Q50 72 58 62\" stroke=\"%23628a4b\" stroke-width=\"2\" fill=\"none\"/></svg>');"></div>

    <!-- Основная открытка -->
    <div class="card">
        <div class="header-flowers">
            <span>🌹</span>
            <span>🌸</span>  <!-- декоративный цветок -->
            <span>🌷</span>
        </div>

        <h1>Оксана, с 8 Марта!</h1>
        <div class="sub-title">Мамочка, любимая</div>

        <!-- Букет из роз и лилий (эмодзи) плюс подписи -->
        <div class="flower-bouquet">
            <div class="bouquet-item">
                <span>🌹🥀🌹</span>
                <p>Розы</p>
            </div>
            <div class="bouquet-item">
                <span>🌺🌸🌺</span>  <!-- лилии + похожие -->
                <p>Лилии</p>
            </div>
        </div>

        <!-- Тёплое сообщение -->
        <div class="message">
            🌷 Пусть этот день пахнет розами и лилиями,<br>
            сияет твоей улыбкой и согревает заботой!<br>
            Ты — самая прекрасная, нежная и родная.<br>
            Спасибо за всё, мама Оксана! 💖<br>
            <i>🌹🌿 С любовью и цветами 🌿🌺</i>
        </div>

        <!-- Подпись (можно поставить своё имя) -->
        <div class="signature">
            <span>Твой(я) ______</span>
        </div>

        <!-- Музыкальная кнопка (плей/пауза) с тихой инструментальной мелодией -->
        <div class="audio-control">
            <button class="audio-btn" id="musicToggle">
                <span id="playPauseIcon">🔊</span> Включить музыку
            </button>
        </div>
        <audio id="bgMusic" loop preload="none">
            <!-- ссылка на бесплатный инструментал (весенняя мелодия) -->
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
            Твой браузер не поддерживает аудио.
        </audio>
    </div>

    <script>
        (function() {
            // Персонализация: имя в подписи можно заменить, но по умолчанию оставим нежно
            const signSpan = document.querySelector('.signature span');
            // Можно попросить ввести имя, но лучше оставим как есть или заменим на "Твои дети"
            // Чтобы было уютно, поставим "Твой сын / дочь" — но каждый сам решит.
            // Оставим нейтрально-ласковое: "Твои родные" 
            // Но так как в задании "мою маму зовут Оксана", возможно подписать "Твой сын/дочь", 
            // сделаем вариант "Твои дети", чтобы никого не обидеть. Либо универсально "С любовью, твои".
            signSpan.innerText = 'С любовью, твои 🌹';

            // Музыка: кнопка вкл/выкл
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('musicToggle');
            const iconSpan = document.getElementById('playPauseIcon');
            
            // Пытаемся загрузить музыку заранее (preload="none" но по клику запустится)
            let isPlaying = false;

            btn.addEventListener('click', function() {
                if (isPlaying) {
                    audio.pause();
                    iconSpan.innerText = '🔈';
                    btn.style.background = '#f8c9d9'; // исходный
                } else {
                    audio.play().catch(e => {
                        alert('Нажми ещё раз — музыка заиграет (нужно разрешение браузера)');
                    });
                    iconSpan.innerText = '🔊';
                    btn.style.background = '#f2b5c7'; // чуть темнее при включении
                }
                isPlaying = !isPlaying;
            });

            // Когда музыка заканчивается (loop стоит, но на случай ошибки)
            audio.addEventListener('ended', function() {
                isPlaying = false;
                iconSpan.innerText = '🔈';
                btn.style.background = '#f8c9d9';
            });

            // если аудио прервалось ошибкой – сброс иконки
            audio.addEventListener('error', function() {
                isPlaying = false;
                iconSpan.innerText = '🔈';
                btn.style.background = '#f8c9d9';
                console.log('Аудио не загрузилось, но это не страшно :)');
            });

            // Останавливаем при закрытии страницы ничего не делаем

            // Добавим интерактивности букету при наведении (уже есть в css)
        })();
    </script>

    <!-- Дополнительный маленький скрипт для красивой замены подписи или просто приветствия -->
    <script>
        (function() {
            // Установим подпись в зависимости от времени суток или просто оставим "Твой ребёнок"
            // Чтобы точно соответствовать "маму зовут Оксана", добавим в message намёк
            // Но всё уже ок, дополним маааленькой деталью: поставим её имя в message ещё разок.
            const messageDiv = document.querySelector('.message');
            // уже есть имя в h1, но можем дописать невидимо? не нужно. и так всё есть
            // Просто немного любви: заменим "Твой(я) ______" на "Твой сын / Твоя дочь" 
            // пусть пользователь сам решит, оставим универсальное "Твой ребёнок"
            // или можно оставить ______ и тогда человек впишет. я сделаю выбор в сторону нейтрального "Твой ребёнок"
            const sign = document.querySelector('.signature span');
            sign.innerText = 'Твой ребёнок ❤️';
            // добавим имя Оксана ещё в message — мелочь, а приятно
            messageDiv.innerHTML = messageDiv.innerHTML.replace('мама', 'мама Оксана');
            // чтобы точно было имя
            if (messageDiv.innerHTML.indexOf('Оксана') === -1) {
                messageDiv.innerHTML = messageDiv.innerHTML + '<br><span style="opacity:0.8;">🌸 Для самой лучшей мамы Оксаны 🌸</span>';
            }
        })();
    </script>
</body>
</html>
