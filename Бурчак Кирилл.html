<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, мама Регина!</title>
    <style>
        /* Обнуление и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9e3f0 0%, #fbc9d6 40%, #fda5b3 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Контейнер для открытки (карточка с полупрозрачным фоном) */
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 250, 240, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 40px rgba(212, 80, 120, 0.25),
                        0 0 0 8px rgba(255, 240, 245, 0.7),
                        0 0 0 12px rgba(250, 200, 190, 0.3);
            padding: 30px 20px 40px 20px;
            text-align: center;
            z-index: 10;
            border: 2px dashed #ff99aa;
            position: relative;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* Основной заголовок с именем */
        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            color: #b34167;
            text-shadow: 3px 3px 0 #ffe2e9, 5px 5px 0 rgba(255, 120, 160, 0.3);
            margin-bottom: 5px;
            letter-spacing: 1px;
            word-break: break-word;
        }

        /* Имя мамы — крупно и нежно */
        .mama-name {
            font-size: 4rem;
            font-weight: 900;
            color: #c2185b;
            background: linear-gradient(45deg, #ff8a9f, #d45e7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px #ffb6c1, 0 0 5px #fff;
            margin-top: -5px;
            line-height: 1.2;
        }

        .mama-name span {
            font-size: 3rem;
            background: none;
            -webkit-text-fill-color: #ba2d5e;
            color: #ba2d5e;
            text-shadow: 2px 2px 0 #ffe0e8;
        }

        .from {
            font-size: 1.9rem;
            font-weight: 600;
            color: #a53f60;
            background: #fff0f3d9;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 60px;
            margin: 15px 0 10px 0;
            box-shadow: 0 4px 8px #ffb0b9;
            backdrop-filter: blur(2px);
        }

        .from strong {
            font-size: 2.3rem;
            color: #c43a5e;
        }

        /* Поздравительный текст */
        .greeting {
            font-size: 1.7rem;
            color: #511f30;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px 20px;
            border-radius: 100px 30px 100px 30px;
            margin: 15px 10px;
            border: 3px dotted #ff7f9f;
            line-height: 1.5;
            box-shadow: inset 0 2px 10px #ffe5ec;
        }

        .greeting i {
            color: #d42362;
            font-size: 2rem;
        }

        /* Общий контейнер для цветов и бабочек (все бабочки/цветы абсолютны) */
        .butterflies, .flowers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* чтобы не мешали наведению на карточку */
            z-index: 2;
        }

        /* ======== Стили бабочек ======== */
        .butterfly {
            position: absolute;
            width: 60px;
            height: 50px;
            opacity: 0.8;
            animation: flutter 6s infinite ease-in-out;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
        }

        /* Крылья бабочки — два псевдоэлемента */
        .butterfly::before,
        .butterfly::after {
            content: '';
            position: absolute;
            width: 35px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ffb3c6, #f55b8c);
            border-radius: 70% 30% 60% 40% / 40% 60% 30% 70%;
            border: 2px solid white;
            box-shadow: 0 5px 10px #ff9eb5;
            transform: rotate(15deg);
        }

        .butterfly::before {
            left: 5px;
            background: radial-gradient(circle at 40% 40%, #fda5c4, #f2689a, #cf3f74);
            transform: rotate(-20deg) scaleX(1.2);
        }

        .butterfly::after {
            right: 5px;
            background: radial-gradient(circle at 60% 40%, #ffd0dc, #fc7fa3, #db497b);
            transform: rotate(20deg) scaleX(1.2);
        }

        /* тельце */
        .butterfly span {
            position: absolute;
            top: 15px;
            left: 27px;
            width: 8px;
            height: 25px;
            background: #4f2d3f;
            border-radius: 40%;
            box-shadow: 0 0 0 2px #ffeef2;
            z-index: 3;
        }

        /* Усики */
        .butterfly .antenna {
            position: absolute;
            top: 5px;
            left: 29px;
            width: 4px;
            height: 15px;
            background: #4f2d3f;
            border-radius: 2px;
            transform: rotate(20deg);
        }
        .butterfly .antenna::after {
            content: '';
            position: absolute;
            top: 0px;
            left: -7px;
            width: 4px;
            height: 15px;
            background: #4f2d3f;
            border-radius: 2px;
            transform: rotate(-40deg);
        }

        /* Анимация порхания */
        @keyframes flutter {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-15px) rotate(3deg) scale(1.03); }
            50% { transform: translateY(5px) rotate(-3deg) scale(0.98); }
            75% { transform: translateY(-8px) rotate(4deg) scale(1.02); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }

        /* ======== Стили цветов ======== */
        .flower {
            position: absolute;
            width: 60px;
            height: 60px;
            opacity: 0.9;
            filter: drop-shadow(0 8px 6px #faaac0);
            animation: sway 8s infinite alternate ease-in-out;
        }

        /* лепестки (используем несколько элементов) */
        .petal {
            position: absolute;
            width: 28px;
            height: 40px;
            background: #ff99bb;
            border-radius: 60% 40% 70% 30%;
            transform-origin: bottom center;
            border: 2px solid white;
            box-shadow: 0 4px 8px #feb0c2;
        }

        .petal1 { transform: rotate(0deg) translateY(-12px); background: #ffb3c6; }
        .petal2 { transform: rotate(60deg) translateY(-12px); background: #ffa5bd; }
        .petal3 { transform: rotate(120deg) translateY(-12px); background: #ff93b2; }
        .petal4 { transform: rotate(180deg) translateY(-12px); background: #ffa1bb; }
        .petal5 { transform: rotate(240deg) translateY(-12px); background: #ffb1c9; }
        .petal6 { transform: rotate(300deg) translateY(-12px); background: #ff9eb9; }

        .center {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 22px;
            height: 22px;
            background: #fdea73;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 3px #f979a6;
            z-index: 5;
        }

        .stem {
            position: absolute;
            top: 35px;
            left: 29px;
            width: 8px;
            height: 40px;
            background: #74a57f;
            border-radius: 4px;
            transform: rotate(5deg);
            z-index: -1;
            box-shadow: 0 6px 4px #a7c0a3;
        }
        .leaf {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #9cc184;
            border-radius: 80% 0 50% 20%;
            transform: rotate(35deg);
            top: 50px;
            left: 22px;
            border-right: 3px solid white;
        }

        /* анимация покачивания цветов */
        @keyframes sway {
            0% { transform: rotate(-2deg) translateY(0); }
            100% { transform: rotate(4deg) translateY(-6px); }
        }

        /* ручное размещение бабочек и цветов для обилия */
        /* Бабочки */
        .b1 { top: 5%; left: 3%; animation-delay: 0s; }
        .b2 { top: 15%; right: 2%; width: 70px; animation-delay: 0.7s; }
        .b3 { bottom: 12%; left: 8%; width: 55px; animation-delay: 0.3s; }
        .b4 { bottom: 25%; right: 10%; width: 80px; animation-delay: 1.2s; }
        .b5 { top: 30%; left: 20%; width: 45px; animation-delay: 0.1s; }
        .b6 { top: 70%; right: 15%; width: 65px; animation-delay: 1.5s; }
        .b7 { top: 50%; left: 1%; width: 90px; animation-delay: 0.9s; }
        .b8 { bottom: 5%; right: 25%; width: 50px; animation-delay: 0.4s; }
        .b9 { top: 85%; left: 30%; width: 60px; animation-delay: 1.8s; }
        .b10 { top: 10%; left: 40%; width: 75px; animation-delay: 0.2s; }
        .b11 { bottom: 40%; right: 3%; width: 55px; animation-delay: 0.6s; }
        .b12 { top: 45%; left: 90%; width: 70px; animation-delay: 1s; }

        /* Цветы */
        .f1 { top: 8%; left: 85%; width: 70px; animation-delay: 0s; }
        .f2 { top: 20%; left: 80%; width: 55px; animation-delay: 0.4s; }
        .f3 { top: 75%; left: 5%; width: 65px; animation-delay: 1s; }
        .f4 { top: 60%; left: 92%; width: 80px; animation-delay: 1.7s; }
        .f5 { top: 45%; left: 12%; width: 60px; animation-delay: 0.1s; }
        .f6 { bottom: 8%; right: 12%; width: 75px; animation-delay: 0.9s; }
        .f7 { top: 82%; left: 80%; width: 55px; animation-delay: 0.5s; }
        .f8 { top: 30%; left: 60%; width: 90px; animation-delay: 1.2s; }
        .f9 { top: 95%; left: 45%; width: 50px; animation-delay: 0.3s; }
        .f10 { top: 12%; left: 15%; width: 70px; animation-delay: 0.8s; }
        .f11 { top: 68%; left: 72%; width: 60px; animation-delay: 1.4s; }
        .f12 { bottom: 20%; left: 45%; width: 85px; animation-delay: 0.2s; }
        .f13 { top: 48%; left: 45%; width: 65px; animation-delay: 0.6s; }
        .f14 { top: 88%; left: 18%; width: 55px; animation-delay: 1.1s; }
        .f15 { top: 3%; left: 68%; width: 60px; animation-delay: 0.7s; }
        .f16 { top: 35%; left: 32%; width: 50px; animation-delay: 1.9s; }

        /* Дополнительный декор: текстурные цветы на фоне */
        .bg-flower {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255,200,220,0.25) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        /* небольшой дополнительный слой с маленькими бабочками (точки) */
        .sparkle {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 30%, #fff4f8 3px, transparent 4px),
                        radial-gradient(circle at 95% 70%, #ffeef2 4px, transparent 5px),
                        radial-gradient(circle at 40% 85%, #ffe2ec 2px, transparent 3px),
                        radial-gradient(circle at 70% 15%, #ffdbe8 3px, transparent 4px);
            background-size: 200px 200px;
            opacity: 0.5;
            pointer-events: none;
        }

        /* адаптация для маленьких экранов */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .mama-name { font-size: 3rem; }
            .greeting { font-size: 1.3rem; }
            .from { font-size: 1.4rem; }
        }
    </style>
</head>
