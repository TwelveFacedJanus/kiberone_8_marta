<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, Гульнара! 💐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(145deg, #f8f0ff 0%, #e6d9ff 70%, #d4c4ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Главный контейнер – нежное стекло */
        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 245, 255, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px 60px 60px 60px;
            box-shadow: 0 25px 50px -8px rgba(120, 80, 180, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.8);
            padding: 35px 25px 45px 25px;
            border: 2px solid rgba(210, 190, 255, 0.5);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        /* Внутренняя обводка для нежности */
        .card::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50px;
            border: 2px dashed rgba(175, 140, 255, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        /* Контент поверх всего */
        .content {
            position: relative;
            z-index: 15;
            text-align: center;
        }

        .title {
            font-size: 3.2rem;
            font-weight: 400;
            color: #4a2c5f;
            text-shadow: 3px 3px 10px rgba(255, 220, 255, 0.7), 0 0 5px #ffffff;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .title span {
            background: linear-gradient(135deg, #8b6eb0, #5f3e8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .subtitle {
            font-size: 2rem;
            color: #6d4f8f;
            margin: 10px 0 20px 0;
            font-style: italic;
            background: rgba(255, 255, 255, 0.3);
            display: inline-block;
            padding: 8px 35px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            border: 1px solid #ffffffb3;
        }

        .name {
            font-size: 3rem;
            font-weight: 600;
            color: #502e7a;
            margin: 5px 0 20px;
            background: rgba(255, 255, 255, 0.4);
            padding: 10px 30px;
            display: inline-block;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid white;
        }

        .name small {
            font-size: 1.8rem;
            color: #9873b9;
        }

        /* КОНВЕРТ - СЮРПРИЗ */
        .surprise-container {
            margin: 30px auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .envelope {
            width: 200px;
            height: 150px;
            background: #dcc9ff;
            position: relative;
            border-radius: 20px 20px 15px 15px;
            box-shadow: 0 15px 25px rgba(106, 66, 155, 0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 3px solid white;
        }

        .envelope:hover {
            transform: scale(1.05);
        }

        .envelope__flap {
            position: absolute;
            top: -30px;
            left: 0;
            width: 100%;
            height: 60px;
            background: #c7aeff;
            clip-path: polygon(0% 0%, 50% 70%, 100% 0%);
            border-radius: 15px 15px 0 0;
            border-bottom: 3px solid white;
            transition: all 0.6s ease;
            transform-origin: top;
            z-index: 20;
        }

        .envelope.open .envelope__flap {
            transform: rotateX(180deg);
            top: -10px;
        }

        .envelope__heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            filter: drop-shadow(0 5px 8px #b385ff);
            animation: pulse 1.8s infinite;
            z-index: 15;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .click-hint {
            font-size: 1.2rem;
            color: #5e3d82;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 25px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            font-style: italic;
            border: 2px dotted #a07ddb;
        }

        /* Скрытое сообщение (появляется после клика) */
        .hidden-message {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.8s ease, opacity 0.8s ease, margin 0.6s ease;
            background: rgba(255, 240, 255, 0.9);
            border-radius: 40px;
            padding: 0 20px;
            margin-top: 0;
            border: 2px solid white;
            box-shadow: 0 10px 30px #d6beff;
            width: 100%;
        }

        .hidden-message.show {
            max-height: 400px;
            opacity: 1;
            padding: 25px 20px;
            margin-top: 20px;
        }

        .hidden-message p {
            font-size: 1.5rem;
            color: #3d295a;
            line-height: 1.6;
        }

        .hidden-message span {
            display: block;
            margin-top: 15px;
            font-size: 1.8rem;
            color: #7646b1;
            font-weight: bold;
        }

        /* Анимация конфетти (появляется при сюрпризе) */
        .confetti {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 20px;
            background: #d9b0ff;
            opacity: 0.7;
            animation: fall 4s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        /* флора и бабочки (прежний слой) */
        .floral-butterfly {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .flower {
            position: absolute;
            width: 65px;
            height: 65px;
            opacity: 0.7;
            filter: drop-shadow(0 8px 12px rgba(120, 60, 190, 0.25));
            animation: floatFlower 6s ease-in-out infinite;
        }

        .flower1 { top: 3%; left: 2%; width: 85px; height: 85px; }
        .flower2 { bottom: 1%; right: 3%; width: 100px; height: 100px; animation-delay: 1.2s; }
        .flower3 { top: 15%; right: 8%; width: 60px; height: 60px; animation-delay: 2.5s; }
        .flower4 { bottom: 12%; left: 5%; width: 75px; height: 75px; animation-delay: 0.8s; }
        .flower5 { top: 25%; left: 20%; width: 55px; height: 55px; animation-delay: 3s; }
        .flower6 { bottom: 25%; right: 15%; width: 90px; height: 90px; animation-delay: 1.8s; }

        .flower svg { width: 100%; height: 100%; }

        .butterfly {
            position: absolute;
            width: 50px;
            height: 50px;
            opacity: 0.8;
            filter: drop-shadow(0 4px 8px #a388cf);
            animation: butterflyFlight 10s infinite alternate ease-in-out;
        }

        .butterfly1 { top: 10%; left: 15%; width: 45px; height: 45px; animation-duration: 14s; }
        .butterfly2 { bottom: 20%; left: 30%; width: 60px; height: 60px; animation-duration: 16s; animation-delay: 2s; }
        .butterfly3 { top: 30%; right: 18%; width: 40px; height: 40px; animation-duration: 12s; animation-delay: 1s; }
        .butterfly4 { bottom: 10%; right: 25%; width: 55px; height: 55px; animation-duration: 18s; animation-delay: 0.5s; }
        .butterfly5 { top: 70%; left: 8%; width: 38px; height: 38px; animation-duration: 15s; animation-delay: 2.2s; }
        .butterfly6 { top: 45%; right: 5%; width: 48px; height: 48px; animation-duration: 13s; animation-delay: 0.2s; }

        .butterfly svg { width: 100%; height: 100%; }

        @keyframes floatFlower {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes butterflyFlight {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(8px, -12px) rotate(5deg) scale(1.02); }
            50% { transform: translate(-6px, 15px) rotate(-3deg) scale(0.98); }
            75% { transform: translate(10px, 5px) rotate(7deg) scale(1.02); }
            100% { transform: translate(-5px, -8px) rotate(-2deg) scale(1); }
        }

        .glitter {
            position: absolute;
            background: radial-gradient(circle, #ffffff 10%, #d9c0ff 70%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            opacity: 0.6;
            z-index: 8;
            pointer-events: none;
            box-shadow: 0 0 10px #f2e6ff;
        }
        .g1 { top: 20%; left: 45%; width: 12px; height: 12px; background: #c8aaff; }
        .g2 { top: 70%; left: 80%; width: 7px; height: 7px; background: #ffffff; }
        .g3 { top: 50%; left: 12%; width: 9px; height: 9px; background: #dbb9ff; }
        .g4 { top: 85%; left: 60%; width: 6px; height: 6px; background: #b794f4; }
        .g5 { top: 15%; left: 88%; width: 10px; height: 10px; background: #ecd6ff; }

        .signature {
            margin-top: 30px;
            font-size: 1.7rem;
            color: #634182;
            border-top: 2px dotted #c6adff;
            padding-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .signature span {
            background: #f2e3ff;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: 500;
            border: 2px solid white;
        }

        @media (max-width: 600px) {
            .title { font-size: 2.4rem; }
            .name { font-size: 2.4rem; }
            .hidden-message p { font-size: 1.2rem; }
        }
    </style>
</head>

    <!-- Конфетти (создаётся динамически) -->
    <div class="confetti" id="confettiContainer" style="display: none;"></div>

    <script>
        const envelope = document.getElementById('envelope');
        const hiddenMessage = document.getElementById('hiddenMessage');
        const confettiContainer = document.getElementById('confettiContainer');
        let isOpen = false;

        // функция для создания конфетти
        function createConfetti() {
            confettiContainer.style.display = 'block';
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.classList.add('confetti-piece');
                // случайные оттенки фиолетового/синего
                const colors = ['#c9abff', '#a881f7', '#dab6ff', '#b692fc', '#e3c9ff', '#9f7aea'];
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.left = Math.random() * 100 + '%';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's'; // 2-4s
                piece.style.width = (Math.random() * 8 + 5) + 'px';
                piece.style.height = (Math.random() * 15 + 10) + 'px';
                piece.style.opacity = Math.random() * 0.6 + 0.3;
                confettiContainer.appendChild(piece);

                // удаляем через 5 секунд
                setTimeout(() => {
                    piece.remove();
                }, 5000);
            }
            // скрываем контейнер через 5 сек, если пусто
            setTimeout(() => {
                if (confettiContainer.children.length === 0) {
                    confettiContainer.style.display = 'none';
                }
            }, 5000);
        }

        envelope.addEventListener('click', () => {
            if (!isOpen) {
                envelope.classList.add('open');
                hiddenMessage.classList.add('show');
                createConfetti();

                // меняем текст hint (по желанию)
                document.querySelector('.click-hint').innerText = '💜 Сюрприз открыт! 💜';
                isOpen = true;
            } else {
                // можно повторно не открывать, но пусть будет эффект
                // создадим ещё немного конфетти
                createConfetti();
            }
        });

        // Дополнительно: можно добавить изменение текста поздравления в основном блоке (необязательно)
        // Но так как "текст меняется" — он меняется в скрытом сообщении, а также при клике можно менять что-то ещё
        // добавим изменение title? по желанию можно.
        // Например, добавим маленькую смену цвета имени после клика (но это не обязательно)
    </script>
</body>
</html>
